<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Wings - Menú Completo</title>
    <style>
        /* Estilos Base - Paleta de colores Space Wings */
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #0f1319;
            color: #ffffff;
        }

        header {
            text-align: center;
            padding: 25px 20px;
        }

        header h1 {
            margin: 0;
            font-size: 2.2rem;
            color: #fca311;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 900;
        }

        /* Contenedor Principal en Dos Columnas */
        .main-layout {
            display: grid;
            grid-template-columns: 1fr 360px;
            gap: 25px;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px 40px 20px;
        }

        @media (max-width: 768px) {
            .main-layout {
                grid-template-columns: 1fr;
            }
        }

        /* Estructura del Menú Izquierdo */
        .menu-seccion {
            margin-bottom: 35px;
        }

        .seccion-titulo {
            color: #fca311;
            font-size: 1.4rem;
            text-transform: uppercase;
            font-weight: bold;
            letter-spacing: 1px;
            margin-bottom: 20px;
            border-bottom: 1px solid #1f2633;
            padding-bottom: 8px;
        }

        .producto-card {
            background-color: #151b26;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 15px;
            border: 1px solid #1f2633;
        }

        .producto-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .producto-nombre {
            font-size: 1.3rem;
            font-weight: bold;
            color: #ffffff;
        }

        .producto-precio {
            font-size: 1.3rem;
            font-weight: bold;
            color: #fca311;
        }

        /* Contenedor de Configuración Interna para Combos */
        .combo-config-box {
            background-color: #0f1319;
            border: 1px solid #1f2633;
            border-radius: 8px;
            padding: 15px;
            margin-top: 10px;
            margin-bottom: 15px;
        }

        .combo-config-titulo {
            font-size: 0.8rem;
            color: #fca311;
            text-transform: uppercase;
            font-weight: bold;
            margin-bottom: 12px;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        /* Selector de Salsas y Opciones */
        .salsa-contenedor {
            margin-top: 0;
            margin-bottom: 10px;
        }

        .salsa-contenedor:last-child {
            margin-bottom: 0;
        }

        .salsa-label {
            display: block;
            font-size: 0.75rem;
            color: #8a99ad;
            text-transform: uppercase;
            font-weight: bold;
            margin-bottom: 6px;
            letter-spacing: 0.5px;
        }

        .salsa-select {
            width: 100%;
            background-color: #1b2230;
            color: #ffffff;
            border: 1px solid #2c374e;
            padding: 12px;
            border-radius: 6px;
            font-size: 1rem;
            appearance: none;
            cursor: pointer;
            box-sizing: border-box;
        }

        /* Botón Agregar */
        .btn-wrapper {
            display: flex;
            justify-content: flex-end;
            margin-top: 15px;
        }

        .btn-agregar {
            background-color: #fca311;
            color: #000000;
            border: none;
            padding: 12px 28px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-agregar:hover {
            background-color: #e5930f;
        }

        /* Panel Lateral Derecho: Carrito/Pedido */
        .carrito-panel {
            background-color: #151b26;
            border-radius: 16px;
            padding: 20px;
            border: 1px solid #1f2633;
            height: fit-content;
            position: sticky;
            top: 20px;
        }

        .carrito-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #1f2633;
            padding-bottom: 15px;
            margin-bottom: 15px;
        }

        .carrito-titulo {
            font-size: 1.3rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .carrito-contador {
            background-color: #fca311;
            color: #000000;
            border-radius: 50%;
            width: 26px;
            height: 26px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 0.9rem;
        }

        /* Campo de Cliente */
        .cliente-seccion {
            margin-bottom: 20px;
        }

        .cliente-input {
            width: 100%;
            box-sizing: border-box;
            background-color: #0f1319;
            border: 1px solid #2c374e;
            color: #ffffff;
            padding: 12px;
            border-radius: 6px;
            font-size: 1rem;
        }

        /* Lista de Productos del Carrito */
        .carrito-vacio {
            text-align: center;
            color: #56667a;
            margin: 40px 0;
            font-size: 0.95rem;
        }

        .carrito-lista {
            list-style: none;
            padding: 0;
            margin: 0 0 20px 0;
            max-height: 400px;
            overflow-y: auto;
        }

        /* Tarjeta de ítem dentro del Carrito */
        .carrito-card-item {
            background-color: #0f1319;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 12px;
            border: 1px solid #1f2633;
        }

        .item-main-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .item-info-col h4 {
            margin: 0;
            font-size: 1.1rem;
            font-weight: bold;
            color: #ffffff;
        }

        .item-salsa-sub {
            margin: 4px 0 0 0;
            font-size: 0.9rem;
            color: #fca311;
            white-space: pre-line;
            line-height: 1.3;
        }

        .item-precio-sub {
            margin: 6px 0 0 0;
            font-size: 1.1rem;
            font-weight: bold;
            color: #fca311;
        }

        /* Controles de Cantidad y Borrado */
        .item-controles-col {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .controles-num {
            display: flex;
            align-items: center;
            background-color: #1b2230;
            border-radius: 6px;
            overflow: hidden;
        }

        .btn-qty {
            background-color: #1b2230;
            color: #ffffff;
            border: none;
            width: 28px;
            height: 28px;
            font-size: 1rem;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }

        .btn-qty:hover {
            background-color: #2c374e;
        }

        .qty-valor {
            padding: 0 10px;
            font-size: 0.95rem;
            font-weight: bold;
            color: #ffffff;
        }

        .btn-eliminar {
            background: none;
            border: none;
            color: #ff4a4a;
            font-size: 1.2rem;
            cursor: pointer;
            padding: 0 4px;
            line-height: 1;
        }

        .btn-eliminar:hover {
            color: #ff1a1a;
        }

        /* Input de notas por producto */
        .notas-item-input {
            width: 100%;
            box-sizing: border-box;
            background-color: #151b26;
            border: 1px solid #2c374e;
            color: #ffffff;
            padding: 8px 10px;
            border-radius: 6px;
            font-size: 0.85rem;
            margin-top: 12px;
        }

        .notas-item-input::placeholder {
            color: #56667a;
        }

        /* Bloque de Cierre de Caja */
        .total-fila {
            display: flex;
            justify-content: space-between;
            font-size: 1.2rem;
            font-weight: bold;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #1f2633;
        }

        .btn-whatsapp {
            width: 100%;
            background-color: #25d366;
            color: #ffffff;
            border: none;
            padding: 14px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 15px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-whatsapp:hover {
            background-color: #20ba59;
        }
    </style>
</head>
<body>

    <header>
        <h1>Space Wings</h1>
    </header>

    <div class="main-layout">
        <!-- Lado Izquierdo: Menú Dinámico -->
        <main>
            <div id="seccion-principal" class="menu-seccion" style="display:none;">
                <div class="seccion-titulo">Platillo Principal</div>
                <div id="cards-principal"></div>
            </div>

            <div id="seccion-snacks" class="menu-seccion" style="display:none;">
                <div class="seccion-titulo">Snacks</div>
                <div id="cards-snacks"></div>
            </div>

            <div id="seccion-combos" class="menu-seccion" style="display:none;">
                <div class="seccion-titulo">Combos</div>
                <div id="cards-combos"></div>
            </div>

            <div id="seccion-bebidas" class="menu-seccion" style="display:none;">
                <div class="seccion-titulo">Bebidas</div>
                <div id="cards-bebidas"></div>
            </div>
        </main>

        <!-- Lado Derecho: Carrito de Pedido -->
        <aside class="carrito-panel">
            <div class="carrito-header">
                <div class="carrito-titulo">🛒 Pedido</div>
                <div id="contador" class="carrito-contador">0</div>
            </div>

            <div class="cliente-seccion">
                <label class="salsa-label">Cliente</label>
                <input type="text" id="nombre-cliente" class="cliente-input" placeholder="Cliente Nuevo">
            </div>

            <div id="msg-vacio" class="carrito-vacio">Carrito vacío.</div>
            <div id="lista-pedido" class="carrito-lista"></div>

            <div class="total-fila">
                <span>Total:</span>
                <span id="total-precio">$0.00</span>
            </div>

            <button class="btn-whatsapp" onclick="enviarPedidoWhatsapp()">
                ⚪ ENVIAR POR WHATSAPP
            </button>
        </aside>
    </div>

    <script>
        // URL DE TU HOJA DE GOOGLE SHEETS EN FORMATO CSV
        const CONFIG_URL_CSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vR5rO4smgDCoyQggGHUfR40G1zudA8tf_Tcwnvl4KPRoyhRVq0jlaUfY3DCQBA_M2Bcxyja7SaPzAz7/pub?gid=0&single=true&output=csv";

        let carrito = [];
        
        let listaPlatillosGlobal = [];
        let listaSalsasGlobal = [];
        let listaSnacksGlobal = [];

        async function ejecutarCargaMenu() {
            try {
                const res = await fetch(CONFIG_URL_CSV);
                const txt = await res.text();
                const lineas = txt.split("\n").map(l => l.trim()).filter(l => l);
                const filas = lineas.slice(1);

                const divPrincipal = document.getElementById("cards-principal");
                const divSnacks = document.getElementById("cards-snacks");
                const divBebidas = document.getElementById("cards-bebidas");
                const divCombos = document.getElementById("cards-combos");

                let rawCombos = [];
                let itemIndex = 0;

                // Primer recorrido: Almacenar listas globales de ingredientes desde tu inventario activo
                filas.forEach(fila => {
                    const col = fila.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    if (col.length >= 5) {
                        const cat = col[1].replace(/"/g, "").trim();
                        const prod = col[2].replace(/"/g, "").trim();
                        const disp = col[4].replace(/"/g, "").trim().toUpperCase();

                        if (disp !== "SI") return;

                        if (cat === "Platillo Principal") {
                            if (!listaPlatillosGlobal.includes(prod)) listaPlatillosGlobal.push(prod);
                            const salsas = col.slice(5).map(s => s.replace(/"/g, "").trim()).filter(s => s);
                            salsas.forEach(s => { if(!listaSalsasGlobal.includes(s)) listaSalsasGlobal.push(s); });
                        } else if (cat === "Snacks") {
                            if (!listaSnacksGlobal.includes(prod)) pointer = listaSnacksGlobal.push(prod);
                        }
                    }
                });

                // Segundo recorrido: Renderizar elementos individuales e identificar IDs de Combo
                filas.forEach(fila => {
                    const col = fila.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    if (col.length >= 5) {
                        const idPlatillo = col[0].replace(/"/g, "").trim();
                        const cat = col[1].replace(/"/g, "").trim();
                        const prod = col[2].replace(/"/g, "").trim();
                        const prec = parseFloat(col[3].replace(/"/g, "").trim()) || 0;
                        const disp = col[4].replace(/"/g, "").trim().toUpperCase();

                        if (disp !== "SI") return;

                        if (cat === "Combo") {
                            if (!rawCombos.find(c => c.id === idPlatillo)) {
                                rawCombos.push({ id: idPlatillo, nombre: prod, precio: prec });
                            }
                        } else {
                            const salsas = col.slice(5).map(s => s.replace(/"/g, "").trim()).filter(s => s);
                            let selectSalsaHtml = "";
                            if (salsas.length > 0) {
                                selectSalsaHtml = `
                                    <div class="salsa-contenedor">
                                        <label class="salsa-label">Salsa para el platillo:</label>
                                        <select id="salsa-${itemIndex}" class="salsa-select">
                                            ${salsas.map(s => `<option value="${s}">${s}</option>`).join("")}
                                        </select>
                                    </div>
                                `;
                            }

                            const cardHtml = `
                                <div class="producto-card">
                                    <div class="producto-header">
                                        <span class="producto-nombre">${prod}</span>
                                        <span class="producto-precio">$${prec.toFixed(2)}</span>
                                    </div>
                                    ${selectSalsaHtml}
                                    <div class="btn-wrapper">
                                        <button class="btn-agregar" onclick="meterAlCarrito('${prod}', ${prec}, ${salsas.length > 0 ? itemIndex : null}, false, null)">
                                            Agregar +
                                        </button>
                                    </div>
                                </div>
                            `;

                            if (cat === "Platillo Principal") {
                                divPrincipal.innerHTML += cardHtml;
                                document.getElementById("seccion-principal").style.display = "block";
                            } else if (cat === "Snacks") {
                                divSnacks.innerHTML += cardHtml;
                                document.getElementById("seccion-snacks").style.display = "block";
                            } else if (cat === "Bebidas") {
                                divBebidas.innerHTML += cardHtml;
                                document.getElementById("seccion-bebidas").style.display = "block";
                            }
                            itemIndex++;
                        }
                    }
                });

                // Renderizar los Combos según sus reglas específicas estructurales
                rawCombos.forEach(combo => {
                    let configInputsHtml = "";
                    const esComboCometa = combo.nombre.toLowerCase().includes("cometa") || combo.id.toUpperCase() === "C2";

                    if (esComboCometa) {
                        configInputsHtml = `
                            <div class="salsa-contenedor">
                                <label class="salsa-label">Platillo Principal 1:</label>
                                <select id="combo-p1-${itemIndex}" class="salsa-select">
                                    ${listaPlatillosGlobal.map(p => `<option value="${p}">${p}</option>`).join("")}
                                </select>
                            </div>
                            <div class="salsa-contenedor">
                                <select id="combo-s1-${itemIndex}" class="salsa-select">
                                    ${listaSalsasGlobal.map(s => `<option value="Salsa 1: ${s}">Salsa 1: ${s}</option>`).join("")}
                                </select>
                            </div>
                            <div class="salsa-contenedor" style="margin-top:12px;">
                                <label class="salsa-label">Platillo Principal 2:</label>
                                <select id="combo-p2-${itemIndex}" class="salsa-select">
                                    ${listaPlatillosGlobal.map(p => `<option value="${p}">${p}</option>`).join("")}
                                </select>
                            </div>
                            <div class="salsa-contenedor">
                                <select id="combo-s2-${itemIndex}" class="salsa-select">
                                    ${listaSalsasGlobal.map(s => `<option value="Salsa 2: ${s}">Salsa 2: ${s}</option>`).join("")}
                                </select>
                            </div>
                            <div class="salsa-contenedor" style="margin-top:12px;">
                                <label class="salsa-label">Snack Incluido:</label>
                                <select id="combo-snack1-${itemIndex}" class="salsa-select">
                                    ${listaSnacksGlobal.map(sn => `<option value="${sn}">${sn}</option>`).join("")}
                                </select>
                            </div>
                        `;
                    } else {
                        configInputsHtml = `
                            <div class="salsa-contenedor">
                                <label class="salsa-label">Platillo Principal:</label>
                                <select id="combo-p1-${itemIndex}" class="salsa-select">
                                    ${listaPlatillosGlobal.map(p => `<option value="${p}">${p}</option>`).join("")}
                                </select>
                            </div>
                            <div class="salsa-contenedor">
                                <select id="combo-s1-${itemIndex}" class="salsa-select">
                                    ${listaSalsasGlobal.map(s => `<option value="Salsa: ${s}">Salsa: ${s}</option>`).join("")}
                                </select>
                            </div>
                            <div class="salsa-contenedor" style="margin-top:12px;">
                                <label class="salsa-label">Snack 1:</label>
                                <select id="combo-snack1-${itemIndex}" class="salsa-select">
                                    ${listaSnacksGlobal.map(sn => `<option value="${sn}">${sn}</option>`).join("")}
                                </select>
                            </div>
                            <div class="salsa-contenedor">
                                <label class="salsa-label">Snack 2:</label>
                                <select id="combo-snack2-${itemIndex}" class="salsa-select">
                                    ${listaSnacksGlobal.map(sn => `<option value="${sn}">${sn}</option>`).join("")}
                                </select>
                            </div>
                        `;
                    }

                    divCombos.innerHTML += `
                        <div class="producto-card">
                            <div class="producto-header">
                                <span class="producto-nombre">${combo.nombre}</span>
                                <span class="producto-precio">$${combo.precio.toFixed(2)}</span>
                            </div>
                            
                            <div class="combo-config-box">
                                <div class="combo-config-titulo">⚙ CONFIGURA TU ${combo.nombre.toUpperCase()}:</div>
                                ${configInputsHtml}
                            </div>

                            <div class="btn-wrapper">
                                <button class="btn-agregar" onclick="meterAlCarrito('${combo.nombre}', ${combo.precio}, ${itemIndex}, true, ${esComboCometa})">
                                    Agregar +
                                </button>
                            </div>
                        </div>
                    `;
                    document.getElementById("seccion-combos").style.display = "block";
                    itemIndex++;
                });

            } catch (err) {
                console.error("Error al procesar la carga remota:", err);
            }
        }

        function meterAlCarrito(nombre, precio, indexElemento, esCombo, esComboCometa) {
            let detallesVariante = "";

            if (esCombo) {
                const p1 = document.getElementById(`combo-p1-${indexElemento}`).value;
                const s1 = document.getElementById(`combo-s1-${indexElemento}`).value;
                const snack1 = document.getElementById(`combo-snack1-${indexElemento}`).value;

                if (esComboCometa) {
                    const p2 = document.getElementById(`combo-p2-${indexElemento}`).value;
                    const s2 = document.getElementById(`combo-s2-${indexElemento}`).value;
                    detallesVariante = `• ${p1} (${s1})\n• ${p2} (${s2})\n• Snack: ${snack1}`;
                } else {
                    const snack2 = document.getElementById(`combo-snack2-${indexElemento}`).value;
                    detallesVariante = `• ${p1} (${s1})\n• Snack 1: ${snack1}\n• Snack 2: ${snack2}`;
                }
            } else if (indexElemento !== null) {
                const selector = document.getElementById(`salsa-${indexElemento}`);
                detallesVariante = selector ? selector.value : "";
            }

            const itemExistente = carrito.find(item => item.nombre === nombre && item.salsa === detallesVariante);
            
            if (itemExistente) {
                itemExistente.cantidad += 1;
            } else {
                carrito.push({ nombre, precio, salsa: detallesVariante, cantidad: 1, notas: "" });
            }
            actualizarPanelCarrito();
        }

        function cambiarCantidad(index, cambio) {
            carrito[index].cantidad += cambio;
            if (carrito[index].cantidad <= 0) {
                carrito.splice(index, 1);
            }
            actualizarPanelCarrito();
        }

        function eliminarDelCarrito(index) {
            carrito.splice(index, 1);
            actualizarPanelCarrito();
        }

        function guardarNota(index, valor) {
            carrito[index].notas = valor;
        }

        function actualizarPanelCarrito() {
            const contenedorLista = document.getElementById("lista-pedido");
            const txtVacio = document.getElementById("msg-vacio");
            const totalLabel = document.getElementById("total-precio");
            const cont = document.getElementById("contador");

            contenedorLista.innerHTML = "";
            let sumaTotal = 0;
            let totalItems = 0;

            if (carrito.length === 0) {
                txtVacio.style.display = "block";
            } else {
                txtVacio.style.display = "none";
                carrito.forEach((item, index) => {
                    const subtotalItem = item.precio * item.cantidad;
                    sumaTotal += subtotalItem;
                    totalItems += item.cantidad;

                    contenedorLista.innerHTML += `
                        <div class="carrito-card-item">
                            <div class="item-main-row">
                                <div class="item-info-col">
                                    <h4>${item.nombre}</h4>
                                    ${item.salsa ? `<div class="item-salsa-sub">${item.salsa}</div>` : ''}
                                    <div class="item-precio-sub">$${subtotalItem.toFixed(2)}</div>
                                </div>
                                <div class="item-controles-col">
                                    <div class="controles-num">
                                        <button class="btn-qty" onclick="cambiarCantidad(${index}, -1)">-</button>
                                        <span class="qty-valor">${item.cantidad}</span>
                                        <button class="btn-qty" onclick="cambiarCantidad(${index}, 1)">+</button>
                                    </div>
                                    <button class="btn-eliminar" onclick="eliminarDelCarrito(${index})">×</button>
                                </div>
                            </div>
                            <input type="text" class="notas-item-input" 
                                placeholder="Notas (salsa, aderezo...)" 
                                value="${item.notas}" 
                                oninput="guardarNota(${index}, this.value)">
                        </div>
                    `;
                });
            }

            totalLabel.innerText = `$${sumaTotal.toFixed(2)}`;
            cont.innerText = totalItems;
        }

        function enviarPedidoWhatsapp() {
            const inputCliente = document.getElementById("nombre-cliente").value.trim();
            const cliente = inputCliente || "Cliente Nuevo";

            if (carrito.length === 0) {
                alert("Agrega productos antes de mandar tu orden");
                return;
            }

            let msg = `*SPACE WINGS - NUEVO PEDIDO*\n`;
            msg += `*Cliente:* ${cliente}\n`;
            msg += `---------------------------\n`;
            
            let total = 0;
            carrito.forEach(item => {
                const subtotal = item.precio * item.cantidad;
                msg += `*${item.cantidad}x* ${item.nombre}\n`;
                if(item.salsa) msg += `${item.salsa}\n`;
                if(item.notas.trim() !== "") msg += `   _Nota: ${item.notas}_\n`;
                msg += `   Subtotal: $${subtotal.toFixed(2)}\n\n`;
                total += subtotal;
            });

            msg += `---------------------------\n`;
            msg += `*Total a Pagar:* $${total.toFixed(2)}`;

            const telefonoLocal = "5210000000000"; // Configura el número real de tu negocio
            window.open(`wa.me{telefonoLocal}?text=${encodeURIComponent(msg)}`, '_blank');
        }

        window.onload = ejecutarCargaMenu;
    </script>
</body>
</html>
