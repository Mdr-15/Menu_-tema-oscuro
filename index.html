<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Wings - Menú Digital</title>
    <style>
        /* --- ESTILOS BASE SPACE WINGS (Dark Mode) --- */
        body { 
            background-color: #0d0f12; 
            color: #ffffff; 
            font-family: 'Arial', sans-serif; 
            margin: 0; 
            display: flex; 
            min-height: 100vh; 
        }
        main { 
            flex: 1; 
            padding: 40px; 
            box-sizing: border-box; 
        }
        h1.logo { 
            color: #ff9f00; 
            font-size: 3rem; 
            text-transform: uppercase; 
            text-align: center; 
            margin-bottom: 40px; 
            font-weight: 900; 
        }
        h2.seccion-titulo { 
            color: #ff9f00; 
            border-bottom: 2px solid #ff9f00; 
            padding-bottom: 8px; 
            margin-top: 40px; 
            text-transform: uppercase; 
            font-size: 1.5rem; 
        }
        .grid-productos { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(290px, 1fr)); 
            gap: 25px; 
            margin-top: 20px; 
        }
        .tarjeta-producto { 
            background-color: #161a1f; 
            border: 1px solid #232931; 
            border-radius: 12px; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            justify-content: space-between;
        }
        .tag-categoria { 
            background-color: #232931; 
            color: #ff9f00; 
            padding: 4px 10px; 
            border-radius: 4px; 
            font-size: 0.8rem; 
            font-weight: bold; 
            margin-bottom: 10px; 
            display: inline-block;
        }
        .precio { 
            font-size: 1.4rem; 
            color: #ff9f00; 
            font-weight: bold; 
            margin: 10px 0; 
        }

        /* --- CONFIGURADOR DE COMBOS BASADO EN TU NUEVA ESTRUCTURA --- */
        .tarjeta-combo-full {
            background-color: #161a1f;
            border: 1px solid #232931;
            border-radius: 12px;
            padding: 25px;
            margin-top: 25px;
            width: 100%;
            box-sizing: border-box;
        }
        .header-combo {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .header-combo h3 {
            margin: 0;
            font-size: 1.5rem;
            color: #ffffff;
            font-weight: bold;
        }
        .header-combo .precio-combo {
            color: #ff9f00;
            font-size: 1.6rem;
            font-weight: bold;
        }
        .config-box {
            background-color: #111418;
            border: 1px solid #1f242b;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .campo-grupo {
            margin-bottom: 18px;
        }
        .campo-grupo label {
            display: block;
            color: #a0aec0;
            font-size: 0.8rem;
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }
        select { 
            width: 100%; 
            background-color: #161a1f; 
            color: #ffffff; 
            border: 1px solid #2d3748; 
            padding: 12px; 
            border-radius: 6px; 
            font-size: 0.95rem;
            box-sizing: border-box;
        }
        .btn-agregar-combo {
            background-color: #ff9f00;
            color: #0d0f12;
            border: none;
            padding: 14px 28px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            float: right;
            font-size: 1rem;
            text-transform: uppercase;
        }
        .btn-agregar-individual {
            background-color: #ff9f00;
            color: #0d0f12;
            border: none;
            padding: 12px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-top: 15px;
            text-transform: uppercase;
        }

        /* --- PANEL LATERAL DEL PEDIDO --- */
        aside.panel-pedido { 
            width: 380px; 
            background-color: #161a1f; 
            border-left: 1px solid #232931; 
            padding: 30px; 
            position: sticky; 
            top: 0; 
            height: 100vh; 
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
        }
        .cabecera-pedido { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #232931; padding-bottom: 15px; }
        .contador-badge { background-color: #ff9f00; color: #0d0f12; border-radius: 50%; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        .input-nombre { width: 100%; padding: 12px; border-radius: 6px; border: 1px solid #3a4454; background-color: #0d0f12; color: white; box-sizing: border-box; font-size: 1rem; }
        .Carrito-elementos { flex: 1; overflow-y: auto; margin-top: 20px; }
        .item-carrito-fila { background-color: #0d0f12; padding: 12px; border-radius: 8px; margin-bottom: 12px; border: 1px solid #232931; }
        .item-controles { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; border-top: 1px solid #161a1f; padding-top: 8px; }
        .item-botones-qty button { background-color: #232931; color: white; border: none; width: 24px; height: 24px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .Total { border-top: 1px solid #232931; padding-top: 15px; display: flex; justify-content: space-between; font-size: 1.4rem; font-weight: bold; }
        .Total span:last-child { color: #ff9f00; }
        .Boton-enviar { background-color: #25d366; color: white; border: none; width: 100%; padding: 15px; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 15px; text-transform: uppercase; font-size: 1rem; }

        @media (max-width: 990px) { body { flex-direction: column; } aside.panel-pedido { width: 100%; height: auto; position: relative; } }
    </style>
</head>
<body>

    <main>
        <h1 class="logo">Space Wings</h1>
        
        <h2 class="seccion-titulo">Nuestras Especialidades</h2>
        <div id="contenedor-individuales" class="grid-productos"></div>
        
        <h2 class="seccion-titulo">Combos Space Wings</h2>
        <div id="contenedor-combos"></div>
    </main>

    <aside class="panel-pedido">
        <div class="cabecera-pedido">
            <h2>🛒 Pedido</h2>
            <div class="contador-badge" id="badge-contador">0</div>
        </div>
        
        <div style="margin-top: 20px;">
            <label style="display: block; color: #a0aec0; margin-bottom: 8px; font-size: 0.85rem; font-weight: bold; text-transform: uppercase;">Cliente *</label>
            <input type="text" id="nombre-cliente" class="input-nombre" placeholder="Ingresa tu nombre">
        </div>
        
        <div class="Carrito-elementos" id="carrito-lista">
            <p id="carrito-vacio-texto" style="color: #718096; text-align: center; margin-top: 40px;">Carrito vacío.</p>
        </div>
        
        <div class="Total">
            <span>Total:</span>
            <span id="carrito-total">$0.00</span>
        </div>
        
        <button class="Boton-enviar" id="btn-whatsapp">Enviar por WhatsApp</button>
    </aside>

    <script>
        // Recuerda colocar aquí tu enlace público de Google Sheets (.csv) cuando lo uses en producción
        const urlGoogleSheets = "https://docs.google.com/spreadsheets/d/e/2PACX-1vR5rO4smgDCoyQggGHUfR40G1zudA8tf_Tcwnvl4KPRoyhRVq0jlaUfY3DCQBA_M2Bcxyja7SaPzAz7/pub?gid=0&single=true&output=csv"; 

        let baseDatosProductos = { individuales: [], combos: [] };
        let carrito = [];

        async function cargarMenuCompleto() {
            try {
                const respuesta = await fetch(urlGoogleSheets);
                const textoCSV = await respuesta.text();
                
                baseDatosProductos = parsearEstructuraMenu(textoCSV);
                
                renderizarArticulosIndividuales(baseDatosProductos.individuales);
                renderizarCombosDinamicos(baseDatosProductos.combos);
                actualizarInterfazCarrito();
            } catch (error) {
                console.error("Fallo al inicializar base de datos:", error);
            }
        }

        function limpiarTextoSheets(celda) {
            if (!celda) return '';
            return celda.trim().replace(/^"|"$/g, '').trim();
        }

        // === NUEVO MOTOR DE PARSEO ADAPTADO A TU NUEVA TABLA ===
        function parsearEstructuraMenu(texto) {
            const lineas = texto.split('\n').map(l => l.trim()).filter(l => l.length > 0);
            const individuales = [];
            const combosAgrupados = {};
            let leyendoCombos = false;

            for (let i = 0; i < lineas.length; i++) {
                const linea = lineas[i];
                const columnas = linea.split(',').map(limpiarTextoSheets);

                // Detectamos la cabecera de la segunda tabla (Combos) mediante la columna F
                if (columnas[5] && columnas[5].toLowerCase() === 'categoria' && i > 3) {
                    leyendoCombos = true;
                    continue;
                }

                if (!columnas[0] || columnas[0] === 'Id_platillo' || columnas[0] === 'CONF') {
                    continue;
                }

                const disponible = columnas[4] ? columnas[4].toLowerCase() === 'si' : false;
                if (!disponible) continue;

                // 1. CARGAR ESPECIALIDADES INDIVIDUALES (Tabla de arriba)
                if (columnas[0].startsWith('P') && !leyendoCombos) {
                    const producto = {
                        id: columnas[0],
                        categoria: columnas[1],
                        nombre: columnas[2],
                        precio: parseFloat(columnas[3]) || 0,
                        salsas: []
                    };
                    // Extraemos las salsas horizontales (Columnas F en adelante)
                    for (let s = 5; s < columnas.length; s++) {
                        if (columnas[s]) producto.salsas.push(columnas[s]);
                    }
                    individuales.push(producto);
                } 
                
                // 2. CARGAR COMBOS AGRUPADOS INTELIGENTEMENTE (Tabla de abajo)
                if (columnas[0].startsWith('C')) {
                    const comboId = columnas[0];
                    const nombreCombo = columnas[2];
                    const precioCombo = parseFloat(columnas[3]) || 0;
                    
                    const componenteCategoria = columnas[5]; // Ej: "Platillo Principal 1"
                    const componenteProducto = columnas[6];  // Ej: "Alitas"
                    
                    // Extraemos las salsas específicas de esta opción del combo
                    const salsasComponente = [];
                    for (let s = 7; s < columnas.length; s++) {
                        if (columnas[s]) salsasComponente.push(columnas[s]);
                    }

                    // Inicializamos el objeto del combo si no existe
                    if (!combosAgrupados[comboId]) {
                        combosAgrupados[comboId] = {
                            id: comboId,
                            nombre: nombreCombo,
                            precio: precioCombo,
                            secciones: {} // Agrupador por tipo de paso (Platillo 1, Platillo 2, Snack 1)
                        };
                    }

                    // Inicializamos la sección interna (Ej: "Platillo Principal 1")
                    if (!combosAgrupados[comboId].secciones[componenteCategoria]) {
                        combosAgrupados[comboId].secciones[componenteCategoria] = [];
                    }

                    // Guardamos la opción ejecutable dentro de su sección
                    combosAgrupados[comboId].secciones[componenteCategoria].push({
                        nombre: componenteProducto,
                        salsas: salsasComponente
                    });
                }
            }
            return { individuales, combos: Object.values(combosAgrupados) };
        }

        function renderizarArticulosIndividuales(productos) {
            const contenedor = document.getElementById('contenedor-individuales');
            if (!contenedor) return;
            contenedor.innerHTML = '';

            productos.forEach(prod => {
                let selectSalsas = '';
                if (prod.salsas.length > 0) {
                    selectSalsas = `
                        <select id="salsa-${prod.id}" style="margin-top:10px;">
                            <option value="">-- Selecciona Salsa --</option>
                            ${prod.salsas.map(s => `<option value="${s}">${s}</option>`).join('')}
                        </select>`;
                }

                contenedor.innerHTML += `
                    <div class="tarjeta-producto">
                        <div>
                            <span class="tag-categoria">${prod.categoria}</span>
                            <h3 style="margin:5px 0;">${prod.nombre}</h3>
                            <p class="precio">$${prod.precio.toFixed(2)}</p>
                            ${selectSalsas}
                        </div>
                        <button class="btn-agregar-individual" onclick="agregarIndividualAlCarrito('${prod.id}')">Agregar +</button>
                    </div>`;
            });
        }

        // === NUEVO RENDERIZADOR DE COMBOS MULTI-OPCIÓN (ESTILO EXACTO DE TU IMAGEN) ===
        function renderizarCombosDinamicos(combos) {
            const contenedor = document.getElementById('contenedor-combos');
            if (!contenedor) return;
            contenedor.innerHTML = '';

            combos.forEach(combo => {
                let htmlCampos = '';
                let indexPaso = 0;
                let referenciasAInicializar = [];

                // Recorremos cada sección agrupada (Ej: "Platillo Principal 1", "Platillo Principal 2", "Snacks 1")
                for (const [nombreSeccion, opciones] of Object.entries(combo.secciones)) {
                    const idSelectProducto = `combo-${combo.id}-prod-${indexPaso}`;
                    const idSelectSalsa = `combo-${combo.id}-salsa-${indexPaso}`;
                    
                    const esPlatilloPrincipal = nombreSeccion.toLowerCase().includes("platillo principal");
                    const esFijo = opciones.length === 1;

                    // Creamos las opciones del menú desplegable con los productos que tú definiste en tu Google Sheet
                    let htmlOpciones = opciones.map(opc => `<option value="${opc.nombre}">${opc.nombre}</option>`).join('');

                    // Renderizado de la etiqueta superior (Forzamos mayúsculas)
                    let etiquetaLabel = `${nombreSeccion.toUpperCase()}:`;
                    if (esFijo && nombreSeccion.toLowerCase().includes("snack")) {
                        etiquetaLabel = `SNACK INCLUIDO (FIJO):`;
                    }

                    // Bloque condicional de salsas
                    let bloqueSalsa = '';
                    if (esPlatilloPrincipal) {
                        const numeroSalsa = nombreSeccion.replace(/\D/g, ""); // Extrae el número de la sección (1, 2, etc)
                        bloqueSalsa = `
                            <div class="campo-grupo" style="margin-top:10px;">
                                <label>SALSA ${numeroSalsa || 1}:</label>
                                <select id="${idSelectSalsa}">
                                    <option value="">-- Selecciona tu Salsa --</option>
                                </select>
                            </div>`;
                        
                        // Guardamos la referencia para inyectar la lista de salsas al arrancar
                        referenciasAInicializar.push({
                            idCombo: combo.id,
                            nombreSeccion: nombreSeccion,
                            idProd: idSelectProducto,
                            idSalsa: idSelectSalsa
                        });
                    }

                    htmlCampos += `
                        <div class="campo-grupo">
                            <label>${etiquetaLabel}</label>
                            <select id="${idSelectProducto}" onchange="actualizarSalsasEstructuraNueva('${combo.id}', '${nombreSeccion}', ${indexPaso})">
                                ${htmlOpciones}
                            </select>
                            ${bloqueSalsa}
                        </div>`;
                    
                    indexPaso++;
                }

                contenedor.innerHTML += `
                    <div class="tarjeta-combo-full">
                        <div class="header-combo">
                            <h3>${combo.nombre}</h3>
                            <span class="precio-combo">$${combo.precio.toFixed(2)}</span>
                        </div>
                        <div class="config-box">
                            <div style="color: #ff9f00; font-size: 0.85rem; font-weight: bold; text-transform: uppercase; margin-bottom: 20px;">⚙️ Configura tu ${combo.nombre.toLowerCase()}:</div>
                            ${htmlCampos}
                        </div>
                        <div style="overflow:hidden;">
                            <button class="btn-agregar-combo" onclick="agregarComboEstructuraNueva('${combo.id}', ${indexPaso})">Agregar +</button>
                        </div>
                    </div>`;

                // Auto-inicializador: Carga de inmediato las salsas correspondientes a la primera opción ("Alitas")
                setTimeout(() => {
                    referenciasAInicializar.forEach(ref => {
                        const pSel = document.getElementById(ref.idProd);
                        const sSel = document.getElementById(ref.idSalsa);
                        if (pSel && sSel) {
                            const productoSeleccionado = pSel.value;
                            const datosOpcion = combo.secciones[ref.nombreSeccion].find(o => o.nombre === productoSeleccionado);
                            if (datosOpcion && datosOpcion.salsas.length > 0) {
                                sSel.innerHTML = `<option value="">-- Selecciona tu Salsa --</option>` + 
                                    datosOpcion.salsas.map(s => `<option value="${s}">${s}</option>`).join('');
                            }
                        }
                    });
                }, 60);
            });
        }

        // Ejecuta el cambio de salsas en tiempo real si el usuario cambia el platillo (ej: de Alitas a Boneless)
        function actualizarSalsasEstructuraNueva(comboId, nombreSeccion, indexPaso) {
            const combo = baseDatosProductos.combos.find(c => c.id === comboId);
            const prodSelect = document.getElementById(`combo-${comboId}-prod-${indexPaso}`);
            const salsaSelect = document.getElementById(`combo-${comboId}-salsa-${indexPaso}`);
            if (!combo || !prodSelect || !salsaSelect) return;

            const productoSeleccionado = prodSelect.value;
            const datosOpcion = combo.secciones[nombreSeccion].find(o => o.nombre === productoSeleccionado);

            if (datosOpcion && datosOpcion.salsas.length > 0) {
                salsaSelect.innerHTML = `<option value="">-- Selecciona tu Salsa --</option>` + 
                    datosOpcion.salsas.map(s => `<option value="${s}">${s}</option>`).join('');
                salsaSelect.disabled = false;
            } else {
                salsaSelect.innerHTML = `<option value="">No requiere salsa</option>`;
                salsaSelect.disabled = true;
            }
        }

        function agregarIndividualAlCarrito(id) {
            const producto = baseDatosProductos.individuales.find(p => p.id === id);
            if (!producto) return;

            const selectSalsa = document.getElementById(`salsa-${id}`);
            const salsaSeleccionada = selectSalsa ? selectSalsa.value : '';

            if (producto.salsas.length > 0 && !salsaSeleccionada) {
                alert("Por favor selecciona una salsa para tus alitas o snacks.");
                return;
            }

            const itemExistente = carrito.find(item => item.id === id && item.salsa === salsaSeleccionada);
            if (itemExistente) { itemExistente.cantidad++; } 
            else {
                carrito.push({ id: producto.id, nombre: producto.nombre, precio: producto.precio, salsa: salsaSeleccionada, cantidad: 1 });
            }
            if (selectSalsa) selectSalsa.value = '';
            actualizarInterfazCarrito();
        }

        function agregarComboEstructuraNueva(comboId, totalPasos) {
            const combo = baseDatosProductos.combos.find(c => c.id === comboId);
            if (!combo) return;

            let configuracionFinal = [];
            let validacionCorrecta = true;

            let index = 0;
            for (const [nombreSeccion, opciones] of Object.entries(combo.secciones)) {
                const prodSelect = document.getElementById(`combo-${comboId}-prod-${index}`);
                const salsaSelect = document.getElementById(`combo-${comboId}-salsa-${index}`);

                const nombreArticulo = prodSelect ? prodSelect.value : '';
                const salsaArticulo = (salsaSelect && !salsaSelect.disabled) ? salsaSelect.value : '';

                if (!nombreArticulo) { validacionCorrecta = false; break; }

                if (salsaSelect && !salsaSelect.disabled && !salsaArticulo) {
                    alert(`Por favor elige la salsa para tu ${nombreSeccion.toLowerCase()}: ${nombreArticulo}`);
                    validacionCorrecta = false;
                    break;
                }

                configuracionFinal.push(`${nombreArticulo}${salsaArticulo ? ` (🌶️ ${salsaArticulo})` : ''}`);
                index++;
            }

            if (!validacionCorrecta) return;

            const descripcionCombo = `[${configuracionFinal.join(' + ')}]`;
            const itemExistente = carrito.find(item => item.id === comboId && item.descripcion === descripcionCombo);

            if (itemExistente) { itemExistente.cantidad++; } 
            else {
                carrito.push({ id: combo.id, nombre: combo.nombre, descripcion: descripcionCombo, precio: combo.precio, cantidad: 1 });
            }
            actualizarInterfazCarrito();
        }

        function cambiarCantidad(index, cambio) {
            carrito[index].cantidad += cambio;
            if (carrito[index].cantidad <= 0) carrito.splice(index, 1);
            actualizarInterfazCarrito();
        }

        function actualizarInterfazCarrito() {
            const contenedorLista = document.getElementById('carrito-lista');
            const badgeContador = document.getElementById('badge-contador');
            const totalTexto = document.getElementById('carrito-total');

            let montoTotal = 0;
            let piezasTotales = 0;

            contenedorLista.innerHTML = '<p id="carrito-vacio-texto" style="color: #718096; text-align: center; margin-top: 40px;">Carrito vacío.</p>';
            const txtRef = document.getElementById('carrito-vacio-texto');

            if (carrito.length > 0) {
                if (txtRef) txtRef.style.display = 'none';
                
                carrito.forEach((item, index) => {
                    const subtotal = item.precio * item.cantidad;
                    montoTotal += subtotal;
                    piezasTotales += item.cantidad;

                    const fila = document.createElement('div');
                    fila.classList.add('item-carrito-fila');
                    fila.innerHTML = `
                        <div style="display:flex; justify-content:space-between;">
                            <div>
                                <p style="margin:0; font-weight:bold;">${item.nombre}</p>
                                ${item.salsa ? `<p style="margin:4px 0 0 0; color:#ff9f00; font-size:0.85rem;">Salsa: ${item.salsa}</p>` : ''}
                                ${item.descripcion ? `<p style="margin:4px 0 0 0; color:#a0aec0; font-size:0.8rem; font-style:italic;">${item.descripcion}</p>` : ''}
                            </div>
                        </div>
                        <div class="item-controles">
                            <div class="item-botones-qty">
                                <button onclick="cambiarCantidad(${index}, -1)">-</button>
                                <span>${item.cantidad}</span>
                                <button onclick="cambiarCantidad(${index}, 1)">+</button>
                            </div>
                            <span style="font-weight:bold; color:#ff9f00;">$${subtotal.toFixed(2)}</span>
                        </div>`;
                    contenedorLista.appendChild(fila);
                });
            }

            if (badgeContador) badgeContador.innerText = piezasTotales;
            if (totalTexto) totalTexto.innerText = `$${montoTotal.toFixed(2)}`;
        }

        function despacharPedidoAWhatsApp() {
            const cliente = document.getElementById('nombre-cliente').value.trim();
            if (!cliente) { alert("Por favor escribe tu nombre."); return; }
            if (carrito.length === 0) { alert("Tu carrito está vacío."); return; }

            const miTelefonoSpaceWings = "521234567890"; // Reemplaza con tu celular real

            let msg = `🚀 *NUEVO PEDIDO - SPACE WINGS* 🚀\n\n`;
            msg += `👤 *Cliente:* ${cliente}\n`;
            msg += `-------------------------------------------\n`;

            let total = 0;
            carrito.forEach(item => {
                const sub = item.precio * item.cantidad;
                total += sub;
                msg += `📦 *${item.cantidad}x* ${item.nombre}\n`;
                if (item.salsa) msg += `   └ Salsa: ${item.salsa}\n`;
                if (item.descripcion) msg += `   └ ${item.descripcion}\n`;
                msg += `   └ Subtotal: $${sub.toFixed(2)}\n\n`;
            });

            msg += `-------------------------------------------\n`;
            msg += `💰 *TOTAL A PAGAR:* $${total.toFixed(2)}`;

            window.open(`whatsapp.com{miTelefonoSpaceWings}&text=${encodeURIComponent(msg)}`, '_blank');
        }

        document.addEventListener('DOMContentLoaded', () => {
            cargarMenuCompleto();
            document.getElementById('btn-whatsapp').addEventListener('click', despacharPedidoAWhatsApp);
        });
    </script>
</body>
