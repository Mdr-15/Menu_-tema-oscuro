<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menú Digital</title>
    <!-- Enlace a Font Awesome para los iconos de Redes Sociales -->
    <link rel="stylesheet" href="cloudflare.com">
    <style>
        /* Estilos generales basados en tu diseño original */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #1a1a1a;
            color: #ffffff;
        }

        header {
            background-color: #111;
            padding: 30px 20px;
            text-align: center;
            border-bottom: 3px solid #ff4a4a;
        }

        header h1 {
            margin: 0;
            font-size: 2.5rem;
            color: #ff4a4a;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        header p {
            margin: 5px 0 0 0;
            color: #aaa;
            font-size: 1.1rem;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }

        .menu-seccion {
            background-color: #222;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 30px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            border-left: 5px solid #ff4a4a;
        }

        .menu-seccion h2 {
            margin-top: 0;
            color: #ff4a4a;
            border-bottom: 1px solid #444;
            padding-bottom: 10px;
            font-size: 1.6rem;
        }

        .menu-item {
            padding: 15px 0;
            border-bottom: 1px solid #333;
        }

        .menu-item:last-child {
            border-bottom: none;
        }

        .item-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
            font-size: 1.2rem;
        }

        .item-nombre {
            color: #fff;
        }

        .item-precio {
            color: #ff4a4a;
        }

        .item-salsas {
            margin: 5px 0 0 0;
            font-size: 0.9rem;
            color: #ffb0b0;
            font-style: italic;
        }

        .combo-detalles {
            margin: 8px 0 0 0;
            padding-left: 20px;
            color: #bbb;
            font-size: 0.95rem;
        }

        .combo-detalles li {
            margin-bottom: 4px;
        }

        footer {
            background-color: #111;
            text-align: center;
            padding: 20px;
            margin-top: 40px;
            color: #888;
            border-top: 1px solid #222;
        }

        .social-icons {
            margin-bottom: 10px;
        }

        .social-icons a {
            color: #ff4a4a;
            font-size: 1.5rem;
            margin: 0 10px;
            text-decoration: none;
            transition: color 0.3s;
        }

        .social-icons a:hover {
            color: #ffffff;
        }
    </style>
</head>
<body>

    <header>
        <h1>Nuestro Menú</h1>
        <p>¡Disfruta del mejor sabor!</p>
    </header>

    <div class="container">
        <!-- Los contenedores permanecen vacíos, JavaScript inyectará las filas aquí -->
        <section class="menu-seccion">
            <h2>Platillos Principales</h2>
            <div id="contenedor-platillos"></div>
        </section>

        <section class="menu-seccion">
            <h2>Snacks</h2>
            <div id="contenedor-snacks"></div>
        </section>

        <section class="menu-seccion">
            <h2>Combos</h2>
            <div id="contenedor-combos"></div>
        </section>

        <section class="menu-seccion">
            <h2>Bebidas</h2>
            <div id="contenedor-bebidas"></div>
        </section>
    </div>

    <footer>
        <div class="social-icons">
            <a href="#" target="_blank"><i class="fab fa-facebook"></i></a>
            <a href="#" target="_blank"><i class="fab fa-instagram"></i></a>
            <a href="#" target="_blank"><i class="fab fa-whatsapp"></i></a>
        </div>
        <p>&copy; 2026 Menú Digital. Todos los derechos reservados.</p>
    </footer>

    <script>
        // REEMPLAZA ESTA URL CON TU ENLACE REAL DE GOOGLE SHEETS EN FORMATO .CSV
        const URL_CSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vR5rO4smgDCoyQggGHUfR40G1zudA8tf_Tcwnvl4KPRoyhRVq0jlaUfY3DCQBA_M2Bcxyja7SaPzAz7/pub?gid=0&single=true&output=csv";

        async function cargarMenuDigital() {
            try {
                const respuesta = await fetch(URL_CSV);
                if (!respuesta.ok) throw new Error("No se pudo obtener el archivo de Google Sheets");
                
                const textoCsv = await respuesta.text();
                const lineas = textoCsv.split("\n").map(l => l.trim()).filter(l => l);
                
                // Extraemos las filas omitiendo los nombres de las columnas
                const filas = lineas.slice(1);

                // Referencias a los contenedores HTML
                const boxPlatillos = document.getElementById("contenedor-platillos");
                const boxSnacks = document.getElementById("contenedor-snacks");
                const boxBebidas = document.getElementById("contenedor-bebidas");
                const boxCombos = document.getElementById("contenedor-combos");

                // Estructura intermedia para juntar los ingredientes de los combos agrupados
                const mapaCombos = {};

                filas.forEach(fila => {
                    // Separación de columnas respetando posibles textos con comillas internas
                    const columnas = fila.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    
                    if (columnas.length >= 5) {
                        const idPlatillo = columnas[0].replace(/"/g, "").trim();
                        const categoria = columnas[1].replace(/"/g, "").trim();
                        const producto = columnas[2].replace(/"/g, "").trim();
                        const precio = columnas[3].replace(/"/g, "").trim();
                        const disponible = columnas[4].replace(/"/g, "").trim().toUpperCase();

                        // Si el artículo no está marcado explícitamente disponible como SI, se salta
                        if (disponible !== "SI") return;

                        // Caso 1: Bebidas individuales
                        if (categoria === "Bebidas") {
                            boxBebidas.innerHTML += `
                                <div class="menu-item">
                                    <div class="item-header">
                                        <span class="item-nombre">${producto}</span>
                                        <span class="item-precio">$${precio}</span>
                                    </div>
                                </div>
                            `;
                        } 
                        // Caso 2: Alitas, Boneless o Papas individuales
                        else if (categoria === "Platillo Principal" || categoria === "Snacks") {
                            // Extrae las salsas (columnas 5 en adelante) que no estén vacías
                            const salsasArray = columnas.slice(5).map(s => s.replace(/"/g, "").trim()).filter(s => s);
                            const htmlSalsas = salsasArray.length ? `<p class="item-salsas">Opciones: ${salsasArray.join(", ")}</p>` : '';

                            const contenedorDestino = (categoria === "Snacks") ? boxSnacks : boxPlatillos;
                            contenedorDestino.innerHTML += `
                                <div class="menu-item">
                                    <div class="item-header">
                                        <span class="item-nombre">${producto}</span>
                                        <span class="item-precio">$${precio}</span>
                                    </div>
                                    ${htmlSalsas}
                                </div>
                            `;
                        } 
                        // Caso 3: Agrupación de filas que pertenecen a un Combo (C1, C2...)
                        else if (categoria === "Combo") {
                            if (!mapaCombos[idPlatillo]) {
                                mapaCombos[idPlatillo] = {
                                    nombre: producto,
                                    precio: precio,
                                    elementosIncluidos: []
                                };
                            }
                            
                            // Si la fila detalla qué producto incluye el combo (columnas 6 y 7 en adelante según tu estructura)
                            if (columnas[6]) {
                                const elementoCombo = columnas[6].replace(/"/g, "").trim();
                                if (elementoCombo && !mapaCombos[idPlatillo].elementosIncluidos.includes(elementoCombo)) {
                                    mapaCombos[idPlatillo].elementosIncluidos.push(elementoCombo);
                                }
                            }
                        }
                    }
                });

                // Renderizar los combos construidos dinámicamente
                for (const claveCombo in mapaCombos) {
                    const comboData = mapaCombos[claveCombo];
                    const htmlLista = comboData.elementosIncluidos.map(elem => `<li>${elem}</li>`).join("");
                    
                    boxCombos.innerHTML += `
                        <div class="menu-item">
                            <div class="item-header">
                                <span class="item-nombre">${comboData.nombre}</span>
                                <span class="item-precio">$${comboData.precio}</span>
                            </div>
                            <ul class="combo-detalles">
                                ${htmlLista || "<li>Incluye complementos seleccionados</li>"}
                            </ul>
                        </div>
                    `;
                }

            } catch (err) {
                console.error("Error cargando los datos dinámicos del menú:", err);
            }
        }

        // Ejecutar proceso de forma automática al renderizar la interfaz
        window.onload = cargarMenuDigital;
    </script>
</body>
</html>
