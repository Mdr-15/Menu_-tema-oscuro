<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Wings - Menú Digital</title>
    <style>
        /* --- ESTILOS GENERALES (Space Wings Dark Mode) --- */
        body { 
            background-color: #0d0f12; 
            color: #ffffff; 
            font-family: 'Arial', sans-serif; 
            margin: 0; 
            display: flex; 
            min-height: 100vh; 
        }
        main { 
            flex: 1; 
            padding: 40px; 
            box-sizing: border-box; 
        }
        h1.logo { 
            color: #ff9f00; 
            font-size: 3rem; 
            text-transform: uppercase; 
            text-align: center; 
            margin-bottom: 40px; 
            font-weight: 900; 
            letter-spacing: 2px;
        }
        h2.seccion-titulo { 
            color: #ff9f00; 
            border-bottom: 2px solid #ff9f00; 
            padding-bottom: 8px; 
            margin-top: 40px; 
            text-transform: uppercase; 
            font-size: 1.5rem; 
        }
        .grid-productos { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
            gap: 25px; 
            margin-top: 20px; 
        }
        .tarjeta-producto { 
            background-color: #161a1f; 
            border: 1px solid #232931; 
            border-radius: 12px; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            justify-content: space-between;
            transition: transform 0.2s, border-color 0.2s; 
        }
        .tarjeta-producto:hover { 
            transform: translateY(-4px); 
            border-color: #ff9f00; 
        }
        .tag-categoria { 
            background-color: #232931; 
            color: #ff9f00; 
            padding: 4px 10px; 
            border-radius: 4px; 
            font-size: 0.8rem; 
            align-self: flex-start;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .producto-titulo {
            margin: 10px 0 5px 0;
            font-size: 1.3rem;
        }
        .precio { 
            font-size: 1.4rem; 
            color: #ff9f00; 
            font-weight: bold; 
            margin: 10px 0; 
        }
        .detalles-combo {
            list-style: none;
            padding: 0;
            margin: 10px 0 20px 0;
            color: #a0aec0;
            font-size: 0.95rem;
        }
        .detalles-combo li {
            margin-bottom: 8px;
        }
        select { 
            width: 100%; 
            background-color: #0d0f12; 
            color: #ffffff; 
            border: 1px solid #3a4454; 
            padding: 10px; 
            border-radius: 6px; 
            margin: 10px 0 15px 0; 
            box-sizing: border-box;
        }
        .btn-agregar { 
            background-color: #ff9f00; 
            color: #0d0f12; 
            border: none; 
            padding: 12px; 
            border-radius: 6px; 
            font-weight: bold; 
            cursor: pointer; 
            width: 100%; 
            text-transform: uppercase;
        }
        .btn-agregar:hover {
            background-color: #e68f00;
        }

        /* --- INTERFAZ LATERAL DEL PEDIDO / CARRITO --- */
        aside.panel-pedido { 
            width: 380px; 
            background-color: #161a1f; 
            border-left: 1px solid #232931; 
            padding: 30px; 
            position: sticky; 
            top: 0; 
            height: 100vh; 
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
        }
        .cabecera-pedido { 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            border-bottom: 1px solid #232931; 
            padding-bottom: 15px; 
        }
        .cabecera-pedido h2 {
            margin: 0;
            font-size: 1.6rem;
        }
        .contador-badge { 
            background-color: #ff9f00; 
            color: #0d0f12; 
            border-radius: 50%; 
            width: 32px; 
            height: 32px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-weight: bold; 
            font-size: 1.1rem;
        }
        .input-nombre {
            width: 100%; 
            padding: 12px; 
            border-radius: 6px; 
            border: 1px solid #3a4454; 
            background-color: #0d0f12; 
            color: white; 
            font-size: 1rem;
            box-sizing: border-box;
        }
        .Carrito-elementos { 
            flex: 1; 
            overflow-y: auto; 
            margin-top: 20px; 
        }
        #carrito-vacio-texto {
            color: #718096;
            text-align: center;
            margin-top: 40px;
        }
        .item-carrito-fila { 
            background-color: #0d0f12; 
            padding: 12px; 
            border-radius: 8px; 
            margin-bottom: 12px; 
            border: 1px solid #232931; 
        }
        .item-encabezado {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }
        .item-nombre {
            margin: 0;
            font-weight: bold;
            font-size: 0.95rem;
        }
        .item-subtext {
            margin: 4px 0 0 0;
            color: #ff9f00;
            font-size: 0.85rem;
        }
        .item-controles {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
            border-top: 1px solid #161a1f;
            padding-top: 8px;
        }
        .item-botones-qty {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .item-botones-qty button {
            background-color: #232931;
            color: white;
            border: none;
            width: 24px;
            height: 24px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
        .item-precio-subtotal {
            font-weight: bold;
            color: #ff9f00;
        }
        .Total { 
            border-top: 1px solid #232931; 
            padding-top: 15px; 
            margin-top: 15px; 
            display: flex; 
            justify-content: space-between; 
            font-size: 1.4rem; 
            font-weight: bold; 
        }
        .Total span:last-child { 
            color: #ff9f00; 
        }
        .Boton-enviar { 
            background-color: #25d366; 
            color: #ffffff; 
            border: none; 
            width: 100%; 
            padding: 15px; 
            border-radius: 8px; 
            font-weight: bold; 
            cursor: pointer; 
            margin-top: 15px; 
            text-transform: uppercase; 
            font-size: 1rem;
            letter-spacing: 1px;
        }
        .Boton-enviar:hover {
            background-color: #20ba5a;
        }

        /* Responsive */
        @media (max-width: 990px) { 
            body { flex-direction: column; } 
            aside.panel-pedido { width: 100%; height: auto; position: relative; border-left: none; border-top: 2px solid #232931; } 
        }
    </style>
</head>
<body>

    <main>
        <h1 class="logo">Space Wings</h1>
        
        <h2 class="seccion-titulo">Nuestras Especialidades</h2>
        <div id="contenedor-individuales" class="grid-productos"></div>
        
        <h2 class="seccion-titulo">Combos Space Wings</h2>
        <div id="contenedor-combos" class="grid-productos"></div>
    </main>

    <aside class="panel-pedido">
        <div class="cabecera-pedido">
            <h2>🛒 Pedido</h2>
            <div class="contador-badge" id="badge-contador">0</div>
        </div>
        
        <div class="Cliente" style="margin-top: 20px;">
            <label style="display: block; color: #a0aec0; margin-bottom: 8px; font-size: 0.85rem; font-weight: bold; text-transform: uppercase;">Cliente *</label>
            <input type="text" id="nombre-cliente" class="input-nombre" placeholder="Ingresa tu nombre">
        </div>
        
        <div class="Carrito-elementos" id="carrito-lista">
            <p id="carrito-vacio-texto">Carrito vacío.</p>
        </div>
        
        <div class="Total">
            <span>Total:</span>
            <span id="carrito-total">$0.00</span>
        </div>
        
        <button class="Boton-enviar" id="btn-whatsapp">Enviar por WhatsApp</button>
    </aside>

    <script>
        // =========================================================
        // PEGA AQUÍ ABAJO TU ENLACE DE GOOGLE SHEETS ENTRE LAS COMILLAS:
        // =========================================================
        const urlGoogleSheets = "https://docs.google.com/spreadsheets/d/e/2PACX-1vR5rO4smgDCoyQggGHUfR40G1zudA8tf_Tcwnvl4KPRoyhRVq0jlaUfY3DCQBA_M2Bcxyja7SaPzAz7/pub?gid=0&single=true&output=csv";

        let baseDatosProductos = { individuales: [], combos: [] };
        let carrito = [];

        async function cargarMenuCompleto() {
            try {
                if(urlGoogleSheets === "Ahttps://docs.google.com/spreadsheets/d/e/2PACX-1vR5rO4smgDCoyQggGHUfR40G1zudA8tf_Tcwnvl4KPRoyhRVq0jlaUfY3DCQBA_M2Bcxyja7SaPzAz7/pub?gid=0&single=true&output=csv") {
                    alert("Error: Debes pegar tu enlace de publicación CSV de Google Sheets en el script.");
                    return;
                }
                const respuesta = await fetch(urlGoogleSheets);
                if (!respuesta.ok) throw new Error("No se pudo conectar con Google Sheets");
                
                const textoCSV = await respuesta.text();
                baseDatosProductos = parsearEstructuraMenu(textoCSV);
                
                renderizarArticulosIndividuales(baseDatosProductos.individuales);
                renderizarCombos(baseDatosProductos.combos);
                actualizarInterfazCarrito();
            } catch (error) {
                console.error("Error crítico de inicialización:", error);
            }
        }

        function parsearEstructuraMenu(texto) {
            const lineas = texto.split('\n').map(l => l.trim()).filter(l => l.length > 0);
            const individuales = [];
            const combosAgrupados = {};
            let leyendoCombos = false;

            for (let i = 0; i < lineas.length; i++) {
                const linea = lineas[i];
                const columnas = linea.split(',');

                if (columnas[0] && columnas[0].trim() === 'Id_platillo' && i > 5) {
                    leyendoCombos = true;
                    continue;
                }

                if (!columnas[0] || columnas[0] === 'CONF' || columnas[0] === 'Id_platillo') {
                    continue;
                }

                const disponible = columnas[4] ? columnas[4].trim().toLowerCase() === 'si' : false;
                if (!disponible) continue;

                if (!leyendoCombos) {
                    if (columnas[0].startsWith('P')) {
                        const producto = {
                            id: columnas[0].trim(),
                            categoria: columnas[1] ? columnas[1].trim() : 'General',
                            nombre: columnas[2] ? columnas[2].trim() : 'Producto',
                            precio: parseFloat(columnas[3]) || 0,
                            salsas: []
                        };

                        for (let s = 5; s < columnas.length; s++) {
                            const salsa = columnas[s] ? columnas[s].trim() : '';
                            if (salsa) producto.salsas.push(salsa);
                        }
                        individuales.push(producto);
                    }
                } else {
                    if (columnas[0].startsWith('C')) {
                        const comboId = columnas[0].trim();
                        const nombreCombo = columnas[2] ? columnas[2].trim() : 'Combo Especial';
                        const precioCombo = parseFloat(columnas[3]) || 0;
                        
                        const itemIncluido = {
                            categoriaItem: columnas[5] ? columnas[5].trim() : '',
                            nombreItem: columnas[6] ? columnas[6].trim() : '',
                            salsasDisponibles: []
                        };

                        for (let s = 7; s < columnas.length; s++) {
                            const salsa = columnas[s] ? columnas[s].trim() : '';
                            if (salsa) itemIncluido.salsasDisponibles.push(salsa);
                        }

                        if (!combosAgrupados[comboId]) {
                            combosAgrupados[comboId] = {
                                id: comboId,
                                nombre: nombreCombo,
                                precio: precioCombo,
                                incluye: []
                            };
                        }
                        combosAgrupados[comboId].incluye.push(itemIncluido);
                    }
                }
            }

            return { individuales, combos: Object.values(combosAgrupados) };
        }

        function renderizarArticulosIndividuales(productos) {
            const contenedor = document.getElementById('contenedor-individuales');
            if (!contenedor) return;
            contenedor.innerHTML = '';

            productos.forEach(prod => {
                let selectSalsas = '';
                if (prod.salsas.length > 0) {
                    selectSalsas = `
                        <select class="select-salsa" id="salsa-${prod.id}">
                            <option value="">-- Elige una Salsa --</option>
                            ${prod.salsas.map(s => `<option value="${s}">${s}</option>`).join('')}
                        </select>`;
                }

                contenedor.innerHTML += `
                    <div class="tarjeta-producto">
                        <div>
                            <span class="tag-categoria">${prod.categoria}</span>
                            <h3 class="producto-titulo">${prod.nombre}</h3>
                            <p class="precio">$${prod.precio.toFixed(2)}</p>
                            ${selectSalsas}
                        </div>
                        <button class="btn-agregar" onclick="agregarIndividualAlCarrito('${prod.id}')">Agregar</button>
                    </div>`;
            });
        }

        function renderizarCombos(combos) {
            const contenedor = document.getElementById('contenedor-combos');
            if (!contenedor) return;
            contenedor.innerHTML = '';

            combos.forEach(combo => {
                const listaContenido = combo.incluye.map((item, idx) => {
                    let selectSalsaCombo = '';
                    if (item.salsasDisponibles.length > 0) {
                        selectSalsaCombo = `
                            <select class="select-salsa-combo" data-combo="${combo.id}" data-item="${idx}">
                                <option value="">Salsa para item...</option>
                                ${item.salsasDisponibles.map(s => `<option value="${s}">${s}</option>`).join('')}
                            </select>`;
                    }
                    return `<li>• ${item.nombreItem} <small style="color:#718096">(${item.categoriaItem})</small> ${selectSalsaCombo}</li>`;
                }).join('');

                contenedor.innerHTML += `
                    <div class="tarjeta-producto">
                        <div>
                            <span class="tag-categoria">Combo</span>
                            <h3 class="producto-titulo">${combo.nombre}</h3>
                            <p class="precio">$${combo.precio.toFixed(2)}</p>
                            <ul class="detalles-combo">${listaContenido}</ul>
                        </div>
                        <button class="btn-agregar" onclick="agregarComboAlCarrito('${combo.id}')">Pedir Combo</button>
                    </div>`;
            });
        }

        function agregarIndividualAlCarrito(id) {
            const producto = baseDatosProductos.individuales.find(p => p.id === id);
            if (!producto) return;

            const selectSalsa = document.getElementById(`salsa-${id}`);
            const salsaSeleccionada = selectSalsa ? selectSalsa.value : '';

            if (producto.salsas.length > 0 && !salsaSeleccionada) {
                alert("Por favor selecciona una salsa para este artículo.");
                return;
            }

            const itemExistente = carrito.find(item => item.id === id && item.salsa === salsaSeleccionada);

            if (itemExistente) {
                itemExistente.cantidad++;
            } else {
                carrito.push({
                    id: producto.id,
                    nombre: producto.nombre,
                    precio: producto.precio,
                    salsa: salsaSeleccionada,
                    cantidad: 1,
                    esCombo: false
                });
            }

            if (selectSalsa) selectSalsa.value = '';
            actualizarInterfazCarrito();
        }

        function agregarComboAlCarrito(id) {
            const combo = baseDatosProductos.combos.find(c => c.id === id);
            if (!combo) return;

            const selectores = document.querySelectorAll(`.select-salsa-combo[data-combo="${id}"]`);
            let salsasElegidas = [];
            let faltaSalsa = false;

            selectores.forEach(select => {
                if (!select.value) faltaSalsa = true;
                salsasElegidas.push(select.value);
            });

            if (faltaSalsa) {
                alert("Elige la salsa para cada uno de los elementos internos del combo.");
                return;
            }

            const textoSalsas = salsasElegidas.length > 0 ? `(Salsas: ${salsasElegidas.join(' / ')})` : '';
            const uidCombo = `${id}-${salsasElegidas.join('-')}`;

            const itemExistente = carrito.find(item => item.idUnico === uidCombo);

            if (itemExistente) {
                itemExistente.cantidad++;
            } else {
                carrito.push({
                    idUnico: uidCombo,
                    id: combo.id,
                    nombre: `${combo.nombre} ${textoSalsas}`,
                    precio: combo.precio,
                    cantidad: 1,
                    esCombo: true
                });
            }

            selectores.forEach(select => select.value = '');
            actualizarInterfazCarrito();
        }

        function cambiarCantidad(index, cambio) {
            carrito[index].cantidad += cambio;
            if (carrito[index].cantidad <= 0) {
                carrito.splice(index, 1);
            }
            actualizarInterfazCarrito();
        }

        function actualizarInterfazCarrito() {
            const contenedorLista = document.getElementById('carrito-lista');
            const badgeContador = document.getElementById('badge-contador');
            const totalTexto = document.getElementById('carrito-total');

            let montoTotal = 0;
            let piezasTotales = 0;

            if (contenedorLista) {
                contenedorLista.innerHTML = '<p id="carrito-vacio-texto">Carrito vacío.</p>';
            }
            const txtRef = document.getElementById('carrito-vacio-texto');

            if (carrito.length > 0) {
                if (txtRef) txtRef.style.display = 'none';
                
                carrito.forEach((item, index) => {
                    const subtotal = item.precio * item.cantidad;
                    montoTotal += subtotal;
                    piezasTotales += item.cantidad;

                    const fila = document.createElement('div');
                    fila.classList.add('item-carrito-fila');
                    fila.innerHTML = `
                        <div class="item-encabezado">
                            <div>
                                <p class="item-nombre">${item.nombre}</p>
                                ${item.salsa ? `<p class="item-subtext">Salsa: ${item.salsa}</p>` : ''}
                            </div>
                        </div>
                        <div class="item-controles">
                            <div class="item-botones-qty">
                                <button onclick="cambiarCantidad(${index}, -1)">-</button>
                                <span>${item.cantidad}</span>
                                <button onclick="cambiarCantidad(${index}, 1)">+</button>
                            </div>
                            <span class="item-precio-subtotal">$${subtotal.toFixed(2)}</span>
                        </div>`;
                    contenedorLista.appendChild(fila);
                });
            } else {
                if (txtRef) txtRef.style.display = 'block';
            }

            if (badgeContador) badgeContador.innerText = piezasTotales;
            if (totalTexto) totalTexto.innerText = `$${montoTotal.toFixed(2)}`;
        }

        function despacharPedidoAWhatsApp() {
            const inputCliente = document.getElementById('nombre-cliente');
            const cliente = inputCliente ? inputCliente.value.trim() : '';

            if (!cliente) {
                alert("Por favor escribe tu nombre para registrar tu pedido.");
                return;
            }

            if (carrito.length === 0) {
                alert("El carrito está vacío. Añade alimentos al pedido.");
                return;
            }

            // === COLOCA AQUÍ TU TELÉFONO DE WHATSAPP CON TU CÓDIGO DE PAÍS ===
            const miTelefonoSpaceWings = "521234567890"; 

            let bodyMensaje = `🚀 *NUEVO PEDIDO DE SPACE WINGS* 🚀\n\n`;
            bodyMensaje += `👤 *Cliente:* ${cliente}\n`;
            bodyMensaje += `-------------------------------------------\n`;

            let cuentaFinal = 0;
            carrito.forEach(item => {
                const sub = item.precio * item.cantidad;
                cuentaFinal += sub;
                bodyMensaje += `📦 *${item.cantidad}x* ${item.nombre}\n`;
                if (item.salsa) bodyMensaje += `   └ 🌶️ Salsa: ${item.salsa}\n`;
                bodyMensaje += `   └ Subtotal: $${sub.toFixed(2)}\n\n`;
            });

            bodyMensaje += `-------------------------------------------\n`;
            bodyMensaje += `💰 *TOTAL A PAGAR:* $${cuentaFinal.toFixed(2)}`;

            const urlApi = `whatsapp.com{miTelefonoSpaceWings}&text=${encodeURIComponent(bodyMensaje)}`;
            window.open(urlApi, '_blank');
        }

        document.addEventListener('DOMContentLoaded', () => {
            cargarMenuCompleto();
            const btnEnviar = document.getElementById('btn-whatsapp');
            if (btnEnviar) btnEnviar.addEventListener('click', despacharPedidoAWhatsApp);
        });
    </script>
</body>
</html>
