<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menú con Carrito | Space Wings</title>
    <script src="jsdelivr.net"></script>
    <style>
        body { font-family: 'Courier New', monospace; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; background: #eee; }
        .ticket { width: 280px; background: white; padding: 10px; box-sizing: border-box; margin-bottom: 20px; }
        
        .header { text-align: center; border-bottom: 2px solid #000; margin-bottom: 10px; padding-bottom: 10px; }
        .logo-text { font-size: 24px; font-weight: bold; letter-spacing: 2px; }
        .sub-logo { font-size: 11px; text-transform: uppercase; }

        .info { font-size: 11px; margin-bottom: 12px; line-height: 1.3; }
        table { width: 100%; border-collapse: collapse; font-size: 11px; }
        th { border-bottom: 1px solid #000; text-align: left; padding: 5px 0; }
        td { padding: 6px 0; border-bottom: 1px dashed #ccc; vertical-align: top; }
        
        /* Botones para el control del carrito en el ticket */
        .cant-btn { background: #000; color: #fff; border: none; padding: 2px 6px; cursor: pointer; font-weight: bold; margin: 0 2px; border-radius: 3px; }
        .del-btn { background: #ff4d4d; color: white; border: none; padding: 2px 5px; cursor: pointer; border-radius: 3px; }

        .total-box { margin-top: 15px; text-align: right; border-top: 2px solid #000; padding-top: 6px; font-size: 16px; }
        .qr-container { display: flex; justify-content: center; margin-top: 15px; margin-bottom: 5px; }
        .footer { text-align: center; font-size: 11px; margin-top: 15px; border-top: 1px solid #eee; padding-top: 8px; }

        /* Botón de acción principal fuera del ticket */
        .btn-send { margin-bottom: 15px; padding: 12px; background: #25D366; color: #fff; border: none; width: 280px; cursor: pointer; font-weight: bold; border-radius: 5px; font-size: 14px; text-align: center; text-decoration: none; display: block; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        
        /* Sección de catálogo rápido para que el cliente seleccione */
        .catalog { width: 280px; background: #fff; padding: 10px; border-radius: 8px; box-sizing: border-box; margin-bottom: 15px; }
        .catalog h2 { font-size: 14px; margin-top: 0; border-bottom: 1px solid #000; padding-bottom: 5px; }
        .item-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid #eee; font-size: 12px; }
        .add-btn { background: #000; color: #fff; border: none; padding: 5px 10px; cursor: pointer; border-radius: 4px; font-weight: bold; }
    </style>
</head>
<body>

    <!-- 1. Catálogo de productos interactivo -->
    <div class="catalog">
        <h2>🍔 AGREGAR PRODUCTOS</h2>
        <div id="lista-productos"></div>
    </div>

    <!-- 2. Botón flotante para enviar a WhatsApp -->
    <button class="btn-send" onclick="enviarWhatsApp()">💬 ENVIAR PEDIDO POR WHATSAPP</button>
    
    <!-- 3. Previsualización del Ticket físico -->
    <div class="ticket">
        <div class="header">
            <div class="logo-text">SPACE WINGS</div>
            <div class="sub-logo">Sabor que te eleva</div>
        </div>

        <div class="info">
            <b>CLIENTE:</b> <input type="text" id="cliente_input" value="Cliente Nuevo" style="font-family: 'Courier New'; font-size: 11px; border: none; border-bottom: 1px dashed #000; width: 160px; outline: none;"><br>
            <b>FECHA:</b> <span id="fec"></span>
        </div>
        
        <table>
            <thead>
                <tr>
                    <th style="width: 75px;">CANT</th>
                    <th>PRODUCTO</th>
                    <th style="text-align:right; width: 60px;">TOTAL</th>
                </tr>
            </thead>
            <tbody id="tabla">
                <!-- Se llena dinámicamente al presionar agregar -->
            </tbody>
        </table>

        <div class="total-box">
            <strong>TOTAL: $<span id="tot">0.00</span></strong>
        </div>

        <div class="qr-container">
            <div id="qrcode"></div>
        </div>

        <div class="footer">
            ¡GRACIAS POR TU PREFERENCIA!<br>
            <p style="font-size: 9px; margin-top: 8px;">*** Comprobante de Venta ***</p>
        </div>
    </div>

    <script>
        // Número de teléfono de tu negocio (Formato internacional sin el signo +)
        const TELEFONO_NEGOCIO = "523411398581"; 

        // Lista de productos precargados en el sistema
        const productosDisponibles = [
            { id: "p1", nombre: "Alitas BBQ", precio: 120.00 },
            { id: "p2", nombre: "Papas Gajo", precio: 65.00 },
            { id: "p3", nombre: "Boneless", precio: 140.00 },
            { id: "p4", nombre: "Refresco Cola", precio: 35.00 }
        ];

        // Estado global del carrito de compras
        let carrito = [];

        // Inicializar la interfaz gráfica
        document.getElementById('fec').textContent = new Date().toLocaleString();
        
        const divCatalog = document.getElementById('lista-productos');
        productosDisponibles.forEach(prod => {
            divCatalog.innerHTML += `
                <div class="item-row">
                    <div><strong>${prod.nombre}</strong><br>$${prod.precio.toFixed(2)}</div>
                    <button class="add-btn" onclick="agregarAlCarrito('${prod.id}')">+</button>
                </div>`;
        });

        function agregarAlCarrito(id) {
            const prod = productosDisponibles.find(p => p.id === id);
            const existe = carrito.find(item => item.id === id);
            
            if (existe) {
                existe.cantidad++;
            } else {
                carrito.push({ ...prod, cantidad: 1 });
            }
            actualizarInterfaz();
        }

        function cambiarCantidad(id, cambio) {
            const item = carrito.find(p => p.id === id);
            if (!item) return;
            item.cantidad += cambio;
            if (item.cantidad <= 0) {
                carrito = carrito.filter(p => p.id !== id);
            }
            actualizarInterfaz();
        }

        function eliminarDelCarrito(id) {
            carrito = carrito.filter(p => p.id !== id);
            actualizarInterfaz();
        }

        function actualizarInterfaz() {
            const t = document.getElementById('tabla');
            t.innerHTML = "";
            let cuentaTotal = 0;

            if(carrito.length === 0) {
                t.innerHTML = `<tr><td colspan="3" style="text-align:center; color:#999; padding:15px;">Carrito vacío</td></tr>`;
            }

            carrito.forEach(item => {
                let importeItem = item.precio * item.cantidad;
                cuentaTotal += importeItem;

                let row = t.insertRow();
                // Columna 1: Botones de control de cantidad
                row.insertCell(0).innerHTML = `
                    <button class="del-btn" onclick="eliminarDelCarrito('${item.id}')">×</button>
                    <button class="cant-btn" onclick="cambiarCantidad('${item.id}', -1)">-</button>
                    <span>${item.cantidad}</span>
                    <button class="cant-btn" onclick="cambiarCantidad('${item.id}', 1)">+</button>
                `;
                // Columna 2: Nombre
                row.insertCell(1).textContent = item.nombre;
                // Columna 3: Precio total del producto
                let pCell = row.insertCell(2);
                pCell.textContent = importeItem.toFixed(2);
                pCell.style.textAlign = 'right';
            });

            const totalFormateado = cuentaTotal.toFixed(2);
            document.getElementById('tot').textContent = totalFormateado;

            // Actualizar el código QR local en tiempo real
            document.getElementById("qrcode").innerHTML = "";
            const textoQR = `Cliente:${document.getElementById('cliente_input').value}\nTotal:$${totalFormateado}\nSpace Wings`;
            new QRCode(document.getElementById("qrcode"), {
                text: textoQR, width: 130, height: 130, colorDark : "#000000", colorLight : "#ffffff", correctLevel : QRCode.CorrectLevel.M
            });
        }

        // Función para compilar la lista y abrir la API de WhatsApp
        function enviarWhatsApp() {
            if(carrito.length === 0) {
                alert("Por favor, agrega al menos un producto al carrito antes de enviar.");
                return;
            }

            const nombreCliente = document.getElementById('cliente_input').value.trim();
            
            // Construcción del mensaje de texto formateado
            let mensaje = `🚀 *NUEVO PEDIDO - SPACE WINGS* 🚀\n`;
            mensaje += `👤 *Cliente:* ${nombreCliente}\n`;
            mensaje += `📅 *Fecha:* ${document.getElementById('fec').textContent}\n`;
            mensaje += `-------------------------------------\n`;
            
            carrito.forEach(item => {
                let subtotal = item.precio * item.cantidad;
                mensaje += `📦 *${item.cantidad}x* ${item.nombre} -> _$${subtotal.toFixed(2)}_\n`;
            });
            
            mensaje += `-------------------------------------\n`;
            mensaje += `💰 *TOTAL A PAGO:* $${document.getElementById('tot').textContent}\n\n`;
            mensaje += `¡Muchas gracias! Quedo a la espera de la confirmación. 🙌`;

            // Codificar el texto para cumplir con la sintaxis de URL estándar
                const urlWhatsApp = "https://wa.me/523411398581?text=" + encodeURIComponent(mensaje);

            // Redirigir de inmediato a la aplicación de WhatsApp
            window.open(urlWhatsApp, '_blank');
        }

        // Primera llamada para inicializar el estado del QR vacío
        actualizarInterfaz();
    </script>
</body>
</html>
