<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Wings - Menú Digital</title>
    <style>
        /* --- ESTILOS BASE SPACE WINGS (Dark Mode) --- */
        body { 
            background-color: #0d0f12; 
            color: #ffffff; 
            font-family: 'Arial', sans-serif; 
            margin: 0; 
            display: flex; 
            min-height: 100vh; 
        }
        main { 
            flex: 1; 
            padding: 30px; 
            box-sizing: border-box; 
        }
        h1.logo { 
            color: #ff9f00; 
            font-size: 2.2rem; 
            text-transform: uppercase; 
            text-align: center; 
            margin-bottom: 25px; 
            font-weight: 900; 
        }
        h2.seccion-titulo { 
            color: #ff9f00; 
            border-bottom: 2px solid #ff9f00; 
            padding-bottom: 6px; 
            margin-top: 25px; 
            text-transform: uppercase; 
            font-size: 1.2rem; 
        }
        .grid-productos { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); 
            gap: 15px; 
            margin-top: 15px; 
        }
        .tarjeta-producto { 
            background-color: #161a1f; 
            border: 1px solid #232931; 
            border-radius: 10px; 
            padding: 15px; 
            display: flex; 
            flex-direction: column; 
            justify-content: space-between;
        }
        .tag-categoria { 
            background-color: #232931; 
            color: #ff9f00; 
            padding: 3px 6px; 
            border-radius: 4px; 
            font-size: 0.7rem; 
            font-weight: bold; 
            margin-bottom: 6px; 
            display: inline-block;
        }
        .precio { 
            font-size: 1.1rem; 
            color: #ff9f00; 
            font-weight: bold; 
            margin: 6px 0; 
        }

        /* --- CONFIGURADOR DE COMBOS --- */
        .tarjeta-combo-full {
            background-color: #161a1f;
            border: 1px solid #232931;
            border-radius: 10px;
            padding: 18px;
            margin-top: 15px;
            width: 100%;
            box-sizing: border-box;
        }
        .header-combo {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .header-combo h3 {
            margin: 0;
            font-size: 1.2rem;
            color: #ffffff;
            font-weight: bold;
        }
        .header-combo .precio-combo {
            color: #ff9f00;
            font-size: 1.3rem;
            font-weight: bold;
        }
        .config-box {
            background-color: #111418;
            border: 1px solid #1f242b;
            border-radius: 6px;
            padding: 12px;
            margin-bottom: 12px;
        }
        .campo-grupo {
            margin-bottom: 12px;
        }
        .campo-grupo label {
            display: block;
            color: #a0aec0;
            font-size: 0.7rem;
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 4px;
        }
        select { 
            width: 100%; 
            background-color: #161a1f; 
            color: #ffffff; 
            border: 1px solid #2d3748; 
            padding: 8px; 
            border-radius: 6px; 
            font-size: 0.8rem;
            box-sizing: border-box;
        }
        .btn-agregar-combo {
            background-color: #ff9f00;
            color: #0d0f12;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            float: right;
            font-size: 0.85rem;
            text-transform: uppercase;
        }
        .btn-agregar-individual {
            background-color: #ff9f00;
            color: #0d0f12;
            border: none;
            padding: 8px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
            text-transform: uppercase;
            font-size: 0.8rem;
        }

        /* --- INTERFAZ LATERAL ULTRA COMPACTA DEL PEDIDO --- */
        aside.panel-pedido { 
            width: 320px; 
            background-color: #161a1f; 
            border-left: 1px solid #232931; 
            padding: 15px; 
            position: sticky; top: 0; height: 100vh; box-sizing: border-box; display: flex; flex-direction: column;
        }
        .cabecera-pedido { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #232931; padding-bottom: 10px; }
        .cabecera-pedido h2 { margin: 0; font-size: 1.2rem; font-weight: bold; }
        .contador-badge { background-color: #ff9f00; color: #0d0f12; border-radius: 50%; width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 0.8rem; }
        .label-cliente { display: block; color: #a0aec0; margin-bottom: 4px; font-size: 0.7rem; font-weight: bold; text-transform: uppercase; }
        .input-nombre { width: 100%; padding: 8px; border-radius: 6px; border: 1px solid #3a4454; background-color: #0d0f12; color: white; box-sizing: border-box; font-size: 0.85rem; }
        .Carrito-elementos { flex: 1; overflow-y: auto; margin-top: 10px; }
        .item-carrito-fila { background-color: #0d0f12; padding: 8px 10px; border-radius: 6px; margin-bottom: 8px; border: 1px solid #232931; }
        .item-encabezado-flex { display: flex; justify-content: space-between; align-items: center; }
        .item-titulo-carrito { margin: 0; font-weight: bold; font-size: 0.85rem; color: #ffffff; }
        .item-salsa-carrito { margin: 1px 0 0 0; color: #ff9f00; font-size: 0.75rem; font-style: italic; }
        .item-desc-carrito { margin: 2px 0 0 0; color: #a0aec0; font-size: 0.7rem; font-style: italic; line-height: 1.1; }
        .item-precio-carrito { font-weight: bold; color: #ff9f00; font-size: 0.85rem; margin: 2px 0 0 0; }
        .controles-contenedor { display: flex; align-items: center; gap: 8px; }
        .item-botones-qty { display: flex; align-items: center; background-color: #232931; border-radius: 4px; padding: 1px; }
        .item-botones-qty button { background: none; color: #ffffff; border: none; width: 18px; height: 18px; cursor: pointer; font-weight: bold; font-size: 0.8rem; }
        .item-botones-qty span { font-size: 0.8rem; font-weight: bold; padding: 0 4px; }
        .btn-cancelar { background: none; border: none; color: #e53e3e; font-size: 1rem; font-weight: bold; cursor: pointer; padding: 0; display: flex; align-items: center; }
        .input-nota-carrito { width: 100%; background-color: #161a1f; border: 1px solid #232931; border-radius: 4px; color: #ffffff; padding: 5px; font-size: 0.7rem; margin-top: 6px; box-sizing: border-box; }
        .Total { border-top: 1px solid #232931; padding-top: 10px; display: flex; justify-content: space-between; font-size: 1rem; font-weight: bold; margin-top: 6px; }
        .Boton-enviar { background-color: #25d366; color: white; border: none; width: 100%; padding: 10px; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 10px; text-transform: uppercase; font-size: 0.85rem; letter-spacing: 0.5px; }
        @media (max-width: 990px) { body { flex-direction: column; } aside.panel-pedido { width: 100%; height: auto; position: relative; } }
    </style>
</head>
<body>

    <main>
        <h1 class="logo">Space Wings</h1>
        <h2 class="seccion-titulo">Nuestras Especialidades</h2>
        <div id="contenedor-individuales" class="grid-productos"></div>
        <h2 class="seccion-titulo">Combos Space Wings</h2>
        <div id="contenedor-combos"></div>
    </main>

    <aside class="panel-pedido">
        <div class="cabecera-pedido"><h2>🛒 Pedido</h2><div class="contador-badge" id="badge-contador">0</div></div>
        <div style="margin-top: 10px;"><label class="label-cliente">Cliente *</label><input type="text" id="nombre-cliente" class="input-nombre" placeholder="Ingresa tu nombre"></div>
        <div class="Carrito-elementos" id="carrito-lista"><p id="carrito-vacio-texto" style="color: #718096; text-align: center; margin-top: 20px; font-size: 0.75rem;">Carrito vacío.</p></div>
        <div class="Total"><span>Total:</span><span id="carrito-total">$0.00</span></div>
        <button class="Boton-enviar" id="btn-whatsapp">Enviar por WhatsApp</button>
    </aside>

    <script>
        const urlGoogleSheets = "https://docs.google.com/spreadsheets/d/e/2PACX-1vR5rO4smgDCoyQggGHUfR40G1zudA8tf_Tcwnvl4KPRoyhRVq0jlaUfY3DCQBA_M2Bcxyja7SaPzAz7/pub?gid=0&single=true&output=csv"; 

        let baseDatosProductos = { individuales: [], combos: [] };
        let carrito = [];

        async function cargarMenuCompleto() {
            try {
                const respuesta = await fetch(urlGoogleSheets);
                const textoCSV = await respuesta.text();
                baseDatosProductos = parsearEstructuraMenu(textoCSV);
                renderizarArticulosIndividuales(baseDatosProductos.individuales);
                renderizarCombosDinamicos(baseDatosProductos.combos);
                actualizarInterfazCarrito();
            } catch (error) {
                console.error("Fallo al inicializar base de datos:", error);
            }
        }

        function limpiarTextoSheets(celda) {
            if (!celda) return '';
            return celda.trim().replace(/^"|"$/g, '').trim();
        }

        // === REPARACIÓN DE LA LÓGICA DE DETECCIÓN DE SALSAS HORIZONTALES ===
        function parsearEstructuraMenu(texto) {
            const lineas = texto.split('\n').map(l => l.trim()).filter(l => l.length > 0);
            const individuales = [];
            const combosAgrupados = {};
            let leyendoCombos = false;

            // Índices basados rigurosamente en tu captura de imagen
            const idxId = 0, idxCat = 1, idxNom = 2, idxPre = 3, idxDisp = 4;
            const idxComboPaso = 5; // Columna F (Categoria de paso interno)
            const idxComboProd = 6; // Columna G (Producto interno)

            for (let i = 0; i < lineas.length; i++) {
                const linea = lineas[i];
                const columnas = linea.split(',').map(limpiarTextoSheets);

                if (!columnas || columnas[idxId] === 'Id_platillo' || columnas[idxId] === 'CONF') {
                    if (i > 1 && columnas[idxId] === 'Id_platillo') {
                        leyendoCombos = true;
                    }
                    continue;
                }

                const disponible = columnas[idxDisp] ? columnas[idxDisp].toLowerCase() === 'si' : false;
                if (!disponible) continue;

                // 1. EXTRAER PLATILLOS INDIVIDUALES CON SUS SALSAS HORIZONTALES (P)
                if (columnas[idxId].startsWith('P') && !leyendoCombos) {
                    const producto = {
                        id: columnas[idxId],
                        categoria: columnas[idxCat],
                        nombre: columnas[idxNom],
                        precio: parseFloat(columnas[idxPre]) || 0,
                        salsas: []
                    };
                    
                    // CORRECCIÓN: Las salsas inician a partir del índice 5 (Columna F) en adelante de forma ilimitada
                    for (let s = 5; s < columnas.length; s++) {
                        if (columnas[s]) {
                            producto.salsas.push(columnas[s]);
                        }
                    }
                    individuales.push(producto);
                } 
                
                // 2. EXTRAER COMBOS CONFIGURABLES CON SUS SALSAS (C)
                if (columnas[idxId].startsWith('C')) {
                    const comboId = columnas[idxId];
                    const nombreCombo = columnas[idxNom]; 
                    const precioCombo = parseFloat(columnas[idxPre]) || 0; 
                    
                    const componenteCategoria = columnas[idxComboPaso]; 
                    const componenteProducto = columnas[idxComboProd];  
                    
                    const salsasComponente = [];
                    // Las salsas de los combos inician justo en la columna H (índice 7) en adelante
                    for (let s = 7; s < columnas.length; s++) {
                        if (columnas[s]) salsasComponente.push(columnas[s]);
                    }

                    if (!combosAgrupados[comboId]) {
                        combosAgrupados[comboId] = { id: comboId, nombre: nombreCombo, precio: precioCombo, secciones: {} };
                    }
                    if (!combosAgrupados[comboId].secciones[componenteCategoria]) {
                        combosAgrupados[comboId].secciones[componenteCategoria] = [];
                    }
                    combosAgrupados[comboId].secciones[componenteCategoria].push({ nombre: componenteProducto, salsas: salsasComponente });
                }
            }
            return { individuales, combos: Object.values(combosAgrupados) };
        }

        function renderizarArticulosIndividuales(productos) {
            const contenedor = document.getElementById('contenedor-individuales');
            if (!contenedor) return;
            contenedor.innerHTML = '';

            productos.forEach(prod => {
                let selectSalsas = '';
                if (prod.salsas.length > 0) {
                    selectSalsas = `
                        <select id="salsa-${prod.id}" style="margin-top:6px; padding: 4px; font-size:0.8rem;">
                            <option value="">-- Selecciona Salsa --</option>
                            ${prod.salsas.map(s => `<option value="${s}">${s}</option>`).join('')}
                        </select>`;
                }

                contenedor.innerHTML += `
                    <div class="tarjeta-producto">
                        <div>
                            <span class="tag-categoria">${prod.categoria}</span>
                            <h3 style="margin:4px 0; font-size:1rem;">${prod.nombre}</h3>
                            <p class="precio">$${prod.precio.toFixed(2)}</p>
                            ${selectSalsas}
                        </div>
                        <button class="btn-agregar-individual" onclick="agregarIndividualAlCarrito('${prod.id}')">Agregar +</button>
                    </div>`;
            });
        }

        function renderizarCombosDinamicos(combos) {
            const contenedor = document.getElementById('contenedor-combos');
            if (!contenedor) return;
            contenedor.innerHTML = '';

            combos.forEach(combo => {
                let htmlCampos = '';
                let indexPaso = 0;
                let referenciasAInicializar = [];

                for (const [nombreSeccion, opciones] of Object.entries(combo.secciones)) {
                    const idSelectProducto = `combo-${combo.id}-prod-${indexPaso}`;
                    const idSelectSalsa = `combo-${combo.id}-salsa-${indexPaso}`;
                    
                    const esPlatilloPrincipal = nombreSeccion.toLowerCase().includes("platillo principal");
                    const esFijo = opciones.length === 1;

                    let htmlOpciones = opciones.map(opc => `<option value="${opc.nombre}">${opc.nombre}</option>`).join('');
                    let etiquetaLabel = `${nombreSeccion.toUpperCase()}:`;
                    if (esFijo && nombreSeccion.toLowerCase().includes("snack")) {
                        etiquetaLabel = `SNACK INCLUIDO (FIJO):`;
                    }

                    let bloqueSalsa = '';
                    if (esPlatilloPrincipal) {
                        const numeroSalsa = nombreSeccion.replace(/\D/g, ""); 
                        bloqueSalsa = `
                            <div class="campo-grupo" style="margin-top:6px;">
                                <label>SALSA ${numeroSalsa || 1}:</label>
                                <select id="${idSelectSalsa}" style="padding: 4px; font-size:0.8rem;">
                                    <option value="">-- Selecciona tu Salsa --</option>
                                </select>
                            </div>`;
                        
                        referenciasAInicializar.push({ idCombo: combo.id, nombreSeccion: nombreSeccion, idProd: idSelectProducto, idSalsa: idSelectSalsa });
                    }

                    htmlCampos += `
                        <div class="campo-grupo">
                            <label>${etiquetaLabel}</label>
                            <select id="${idSelectProducto}" onchange="actualizarSalsasEstructuraNueva('${combo.id}', '${nombreSeccion}', ${indexPaso})" style="padding: 4px; font-size:0.8rem;">
                                ${htmlOpciones}
                            </select>
                            ${bloqueSalsa}
                        </div>`;
                    
                    indexPaso++;
                }

                contenedor.innerHTML += `
                    <div class="tarjeta-combo-full">
                        <div class="header-combo">
                            <h3>${combo.nombre}</h3>
                            <span class="precio-combo">$${combo.precio.toFixed(2)}</span>
                        </div>
                        <div class="config-box">
                            <div style="color: #ff9f00; font-size: 0.75rem; font-weight: bold; text-transform: uppercase; margin-bottom: 12px;">⚙️ Configura tu ${combo.nombre.toLowerCase()}:</div>
                            ${htmlCampos}
                        </div>
                        <div style="overflow:hidden;">
                            <button class="btn-agregar-combo" onclick="agregarComboEstructuraNueva('${combo.id}')">Agregar +</button>
                        </div>
                    </div>`;

                setTimeout(() => {
                    referenciasAInicializar.forEach(ref => {
                        const pSel = document.getElementById(ref.idProd);
                        const sSel = document.getElementById(ref.idSalsa);
                        if (pSel && sSel) {
                            const productoSeleccionado = pSel.value;
                            const datosOpcion = combo.secciones[ref.nombreSeccion].find(o => o.nombre === productoSeleccionado);
                            if (datosOpcion && datosOpcion.salsas.length > 0) {
                                sSel.innerHTML = `<option value="">-- Selecciona tu Salsa --</option>` + 
                                    datosOpcion.salsas.map(s => `<option value="${s}">${s}</option>`).join('');
                            }
                        }
                    });
                }, 60);
            });
        }

        function actualizarSalsasEstructuraNueva(comboId, nombreSeccion, indexPaso) {
            const combo = baseDatosProductos.combos.find(c => c.id === comboId);
            const prodSelect = document.getElementById(`combo-${comboId}-prod-${indexPaso}`);
            const salsaSelect = document.getElementById(`combo-${comboId}-salsa-${indexPaso}`);
            if (!combo || !prodSelect || !salsaSelect) return;

            const productoSeleccionado = prodSelect.value;
            const datosOpcion = combo.secciones[nombreSeccion].find(o => o.nombre === productoSeleccionado);

            if (datosOpcion && datosOpcion.salsas.length > 0) {
                salsaSelect.innerHTML = `<option value="">-- Selecciona tu Salsa --</option>` + 
                    datosOpcion.salsas.map(s => `<option value="${s}">${s}</option>`).join('');
                salsaSelect.disabled = false;
            } else {
                salsaSelect.innerHTML = `<option value="">No requiere salsa</option>`;
                salsaSelect.disabled = true;
            }
        }

        function agregarIndividualAlCarrito(id) {
            const producto = baseDatosProductos.individuales.find(p => p.id === id);
            if (!producto) return;

            const selectSalsa = document.getElementById(`salsa-${id}`);
            const salsaSeleccionada = selectSalsa ? selectSalsa.value : '';

            if (producto.salsas.length > 0 && !salsaSeleccionada) {
                alert("Por favor selecciona una salsa para tus alitas o snacks.");
                return;
            }

            const itemExistente = carrito.find(item => item.id === id && item.salsa === salsaSeleccionada);
            if (itemExistente) { 
                itemExistente.cantidad++; 
            } else {
                carrito.push({ uid: Date.now() + Math.random(), id: producto.id, nombre: producto.nombre, precio: producto.precio, salsa: salsaSeleccionada, cantidad: 1, nota: "" });
            }
            if (selectSalsa) selectSalsa.value = '';
            actualizarInterfazCarrito();
        }

        function agregarComboEstructuraNueva(comboId) {
            const combo = baseDatosProductos.combos.find(c => c.id === comboId);
            if (!combo) return;

            let configuracionFinal = [];
            let validacionCorrecta = true;

            let index = 0;
            for (const [nombreSeccion, opciones] of Object.entries(combo.secciones)) {
                const prodSelect = document.getElementById(`combo-${comboId}-prod-${index}`);
                const salsaSelect = document.getElementById(`combo-${comboId}-salsa-${index}`);

                const nombreArticulo = prodSelect ? prodSelect.value : '';
                const salsaArticulo = (salsaSelect && !salsaSelect.disabled) ? salsaSelect.value : '';

                if (!nombreArticulo) { validacionCorrecta = false; break; }

                if (salsaSelect && !salsaSelect.disabled && !salsaArticulo) {
                    alert(`Por favor elige la salsa para tu ${nombreSeccion.toLowerCase()}: ${nombreArticulo}`);
                    validacionCorrecta = false;
                    break;
                }

                configuracionFinal.push(`${nombreArticulo}${salsaArticulo ? ` (🌶️ ${salsaArticulo})` : ''}`);
                index++;
            }

            if (!validacionCorrecta) return;

            const descripcionCombo = `[${configuracionFinal.join(' + ')}]`;
            const itemExistente = carrito.find(item => item.id === comboId && item.descripcion === descripcionCombo);

            if (itemExistente) { itemExistente.cantidad++; } 
            else {
                carrito.push({ uid: Date.now() + Math.random(), id: combo.id, nombre: combo.nombre, descripcion: descripcionCombo, precio: combo.precio, cantidad: 1, nota: "" });
            }
            actualizarInterfazCarrito();
        }

        function cambiarCantidad(uid, cambio) {
            const item = carrito.find(i => i.uid === uid);
            if (!item) return;
            item.cantidad += cambio;
            if (item.cantidad <= 0) {
                eliminarDelCarrito(uid);
            } else {
                actualizarInterfazCarrito();
            }
        }

        function eliminarDelCarrito(uid) {
            carrito = carrito.filter(item => item.uid !== uid);
            actualizarInterfazCarrito();
        }

        function actualizarNotaItem(uid, textoNota) {
            const item = carrito.find(i => i.uid === uid);
            if (item) item.nota = textoNota;
        }

        function actualizarInterfazCarrito() {
            const contenedorLista = document.getElementById('carrito-lista');
            const badgeContador = document.getElementById('badge-contador');
            const totalTexto = document.getElementById('carrito-total');

            let montoTotal = 0;
            let piezasTotales = 0;

            contenedorLista.innerHTML = '<p id="carrito-vacio-texto" style="color: #718096; text-align: center; margin-top: 20px; font-size: 0.75rem;">Carrito vacío.</p>';
            const txtRef = document.getElementById('carrito-vacio-texto');

            if (carrito.length > 0) {
                if (txtRef) txtRef.style.display = 'none';
                
                carrito.forEach((item) => {
                    const subtotal = item.precio * item.cantidad;
                    montoTotal += subtotal;
                    piezasTotales += item.cantidad;

                    const fila = document.createElement('div');
                    fila.classList.add('item-carrito-fila');
                    fila.innerHTML = `
                        <div class="item-encabezado-flex">
                            <div>
                                <p class="item-titulo-carrito">${item.nombre}</p>
                                ${item.salsa ? `<p class="item-salsa-carrito">${item.salsa}</p>` : ''}
                                ${item.descripcion ? `<p class="item-desc-carrito">${item.descripcion}</p>` : ''}
                                <p class="item-precio-carrito">$${subtotal.toFixed(2)}</p>
                            </div>
                            <div class="controles-contenedor">
                                <div class="item-botones-qty">
                                    <button onclick="cambiarCantidad(${item.uid}, -1)">-</button>
                                    <span>${item.cantidad}</span>
                                    <button onclick="cambiarCantidad(${item.uid}, 1)">+</button>
                                </div>
                                <button class="btn-cancelar" onclick="eliminarDelCarrito(${item.uid})">×</button>
                            </div>
                        </div>
                        <input type="text" class="input-nota-carrito" placeholder="Notas (salsa, aderezo...)" value="${item.nota}" oninput="actualizarNotaItem(${item.uid}, this.value)">
                    `;
                    contenedorLista.appendChild(fila);
                });
            }

            if (badgeContador) badgeContador.innerText = piezasTotales;
            if (totalTexto) totalTexto.innerText = `$${montoTotal.toFixed(2)}`;
        }

function despacharPedidoAWhatsApp() {
    const cliente = document.getElementById('nombre-cliente').value.trim();
    if (!cliente) { alert("Por favor escribe tu nombre."); return; }
    if (carrito.length === 0) { alert("Tu carrito está vacío."); return; }

    // === REEMPLAZA ESTE NÚMERO CON TU TELÉFONO REAL DE ATENCIÓN ===
    // Debe incluir código de país, sin espacios ni signos de más (Ej: 521XXXXXXXXXX)
    const miTelefonoSpaceWings = "523411398581"; 

    let msg = `🚀 *NUEVO PEDIDO - SPACE WINGS* 🚀\n\n`;
    msg += `👤 *Cliente:* ${cliente}\n`;
    msg += `-------------------------------------------\n`;

    let total = 0;
    carrito.forEach(item => {
        const sub = item.precio * item.cantidad;
        total += sub;
        msg += `📦 *${item.cantidad}x* ${item.nombre}\n`;
        if (item.salsa) msg += `   └ Salsa: ${item.salsa}\n`;
        if (item.descripcion) msg += `   └ ${item.descripcion}\n`;
        if (item.nota) msg += `   └ Nota especial: _${item.nota}_\n`;
        msg += `   └ Subtotal: $${sub.toFixed(2)}\n\n`;
    });

    msg += `-------------------------------------------\n`;
    msg += `💰 *TOTAL A PAGAR:* $${total.toFixed(2)}`;

    // CORRECCIÓN CRÍTICA: Cambiada la estructura del enlace por el formato oficial wa.me
    const urlApi = `wa.me{miTelefonoSpaceWings}?text=${encodeURIComponent(msg)}`;
    window.open(urlApi, '_blank');
}


        document.addEventListener('DOMContentLoaded', () => {
            cargarMenuCompleto();
            document.getElementById('btn-whatsapp').addEventListener('click', despacharPedidoAWhatsApp);
        });
    </script>
