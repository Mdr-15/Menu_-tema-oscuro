<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menú Interactivo | Space Wings</title>
    <!-- Librerías nativas para estilos y QR -->
    <script src="jsdelivr.net"></script>
    <style>
        /* Estilos Generales Modernos */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 0; background: #0f172a; color: #f8fafc; display: flex; flex-direction: column; min-height: 100vh; }
        
        /* Encabezado Premium */
        header { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); text-align: center; padding: 30px 20px; border-bottom: 1px solid #334155; box-shadow: 0 4px 20px rgba(0,0,0,0.4); }
        .logo-text { font-size: 32px; font-weight: 900; letter-spacing: 4px; color: #f59e0b; margin: 0; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
        .sub-logo { font-size: 13px; text-transform: uppercase; letter-spacing: 2px; color: #94a3b8; margin-top: 6px; }

        /* Contenedor Principal en Dos Columnas */
        .main-container { display: flex; flex-direction: row; flex: 1; max-width: 1200px; width: 100%; margin: 30px auto; padding: 0 20px; gap: 35px; box-sizing: border-box; }
        
        /* COLUMNA IZQUIERDA: Catálogo de Productos */
        .catalog-section { flex: 1; display: flex; flex-direction: column; gap: 20px; }
        .catalog-section h2 { font-size: 20px; margin: 0 0 10px 0; color: #f59e0b; border-bottom: 2px solid #1e293b; padding-bottom: 12px; letter-spacing: 1px; font-weight: 800; }
        
        /* Tarjetas de Producto Ampliadas */
        .product-card { background: #1e293b; border: 1px solid #334155; border-radius: 16px; padding: 24px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3); transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s; }
        .product-card:hover { transform: translateY(-3px); border-color: #f59e0b; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.5); }
        .product-info { display: flex; flex-direction: column; gap: 8px; }
        .product-name { font-size: 18px; font-weight: 700; color: #ffffff; }
        .product-price { font-size: 16px; font-weight: 800; color: #f59e0b; }
        
        /* Botón Añadir Estilizado */
        .add-btn { background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%); color: #0f172a; border: none; padding: 12px 24px; cursor: pointer; border-radius: 10px; font-weight: 800; font-size: 14px; box-shadow: 0 4px 14px rgba(245,158,11,0.3); transition: transform 0.2s, box-shadow 0.2s; }
        .add-btn:hover { transform: scale(1.03); box-shadow: 0 6px 20px rgba(245,158,11,0.5); }

        /* COLUMNA DERECHA: Carrito de Compras Digital Inteligente */
        .cart-section { width: 360px; flex-shrink: 0; display: flex; flex-direction: column; gap: 20px; position: sticky; top: 30px; height: max-content; }
        
        /* Contenedor del nuevo Carrito Tipo App */
        .digital-cart { background: #1e293b; border: 1px solid #334155; border-radius: 20px; padding: 24px; box-sizing: border-box; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.5); }
        .cart-title { font-size: 18px; font-weight: 800; color: #ffffff; margin: 0 0 20px 0; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #334155; padding-bottom: 12px; }
        .cart-count { background: #f59e0b; color: #0f172a; font-size: 12px; padding: 3px 8px; rounded: 20px; border-radius: 20px; font-weight: 900; }
        
        /* Input de Cliente Estilizado */
        .client-box { display: flex; flex-direction: column; gap: 6px; margin-bottom: 20px; }
        .client-box label { font-size: 11px; font-weight: 700; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px; }
        .client-box input { background: #0f172a; border: 1px solid #334155; border-radius: 10px; color: #fff; padding: 10px 14px; font-size: 14px; outline: none; transition: border-color 0.2s; }
        .client-box input:focus { border-color: #f59e0b; }

        /* Lista de Productos en el Carrito */
        .cart-list { display: flex; flex-direction: column; gap: 16px; max-height: 300px; overflow-y: auto; padding-right: 4px; margin-bottom: 20px; }
        .cart-list::-webkit-scrollbar { width: 6px; }
        .cart-list::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        
        /* Filas del Carrito */
        .cart-item { display: flex; justify-content: space-between; align-items: center; background: #0f172a; padding: 12px; border-radius: 12px; border: 1px solid #334155; }
        .item-details { display: flex; flex-direction: column; gap: 4px; }
        .item-name { font-size: 14px; font-weight: 600; color: #f8fafc; }
        .item-subtotal { font-size: 13px; font-weight: 700; color: #f59e0b; }
        
        /* Controles de Cantidad Modificados */
        .qty-controls { display: flex; align-items: center; gap: 8px; }
        .cant-btn { background: #334155; color: #fff; border: none; width: 26px; height: 26px; cursor: pointer; font-weight: bold; border-radius: 6px; font-size: 14px; display: flex; align-items: center; justify-content: center; transition: background 0.2s; }
        .cant-btn:hover { background: #475569; }
        .qty-num { font-size: 14px; font-weight: 700; min-width: 16px; text-align: center; }
        .del-btn { background: transparent; color: #ef4444; border: none; cursor: pointer; font-size: 16px; padding: 4px; font-weight: bold; transition: color 0.2s; }
        .del-btn:hover { color: #f87171; }
        
        /* Cuadro de Resumen de Pago */
        .summary-box { border-top: 1px dashed #334155; padding-top: 16px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .summary-label { font-size: 16px; font-weight: 700; color: #94a3b8; }
        .summary-total { font-size: 22px; font-weight: 900; color: #f59e0b; }

        /* Contenedor QR Digitalizado */
        .qr-wrapper { display: flex; flex-direction: column; align-items: center; gap: 8px; background: #ffffff; padding: 16px; border-radius: 14px; margin-top: 15px; }
        .qr-wrapper span { color: #0f172a; font-size: 11px; font-weight: 800; letter-spacing: 0.5px; text-transform: uppercase; }

        /* Botón de Enviar a WhatsApp Estilizado */
        .btn-send { padding: 16px; background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%); color: #fff; border: none; width: 100%; cursor: pointer; font-weight: 800; border-radius: 12px; font-size: 15px; text-align: center; text-decoration: none; box-shadow: 0 4px 20px rgba(34,197,94,0.3); transition: transform 0.2s, box-shadow 0.2s; display: block; box-sizing: border-box; }
        .btn-send:hover { transform: translateY(-2px); box-shadow: 0 6px 24px rgba(34,197,94,0.5); }

        /* Adaptabilidad para Dispositivos Móviles */
        @media (max-width: 768px) {
            .main-container { flex-direction: column; padding: 0 15px; gap: 25px; margin: 15px auto; }
            .cart-section { width: 100%; position: relative; top: 0; }
            .product-card { padding: 18px; }
        }

        /* Configuración de Respaldo Oculta por si se requiere enviar a Impresora Física */
        @media print { 
            body, .main-container { background: white; color: black; padding: 0; margin: 0; }
            header, .catalog-section, .btn-send, .cant-btn, .del-btn, .client-box, .cart-title { display: none !important; } 
            .cart-section, .digital-cart { width: 280px; background: white; border: none; padding: 0; margin: 0; box-shadow: none; }
            .cart-item { background: white; border: none; border-bottom: 1px dashed #000; color: #000; padding: 6px 0; border-radius: 0; }
            .item-name, .item-subtotal { color: #000; }
            .summary-total { color: #000; font-family: monospace; }
        }
    </style>
</head>
<body>

    <header>
        <h1 class="logo-text">SPACE WINGS</h1>
        <p class="sub-logo">Sabor que te eleva</p>
    </header>

    <div class="main-container">
        
        <!-- LADO IZQUIERDO: Catálogo Ampliado con diseño espacioso -->
        <section class="catalog-section">
            <h2>🔥 NUESTRO MENÚ</h2>
            <div id="lista-productos">
                <!-- Se inyecta dinámicamente con JavaScript -->
            </div>
        </section>

        <!-- LADO DERECHO: Carrito de Compras Digital Estilo App -->
        <section class="cart-section">
            <div class="digital-cart">
                <div class="cart-title">
                    <span>🛒 Tu Pedido</span>
                    <span class="cart-count" id="badge-count">0</span>
                </div>

                <div class="client-box">
                    <label for="cliente_input">Nombre del Cliente</label>
                    <input type="text" id="cliente_input" value="Cliente Nuevo" oninput="actualizarQR()">
                </div>

                <!-- Lista de artículos agregados -->
                <div class="cart-list" id="lista-carrito">
                    <!-- Se llena en tiempo real -->
                </div>

                <div class="summary-box">
                    <span class="summary-label">Total a pagar:</span>
                    <span class="summary-total">$<span id="tot">0.00</span></span>
                </div>

                <button class="btn-send" onclick="enviarWhatsApp()">💬 ENVIAR PEDIDO POR WHATSAPP</button>

                <!-- Código QR Integrado en la App Visual -->
                <div class="qr-wrapper" id="qr-block" style="display: none;">
                    <span>Código de Validación</span>
                    <div id="qrcode"></div>
                </div>
            </div>
        </section>

    </div>

    <script>
        // Catálogo de Productos
        const productosDisponibles = [
            { id: "p1", nombre: "Alitas BBQ Clásicas", precio: 120.00 },
            { id: "p2", nombre: "Papas Gajo Sazonadas", precio: 65.00 },
            { id: "p3", nombre: "Boneless Crujientes", precio: 140.00 },
            { id: "p4", nombre: "Refresco Cola 600ml", precio: 35.00 }
        ];

        let carrito = [];

        // Generar lista de productos visuales en la interfaz izquierda
        const divCatalog = document.getElementById('lista-productos');
        productosDisponibles.forEach(prod => {
            divCatalog.innerHTML += `
                <div class="product-card">
                    <div class="product-info">
                        <span class="product-name">${prod.nombre}</span>
                        <span class="product-price">$${prod.precio.toFixed(2)}</span>
                    </div>
                    <button class="add-btn" onclick="agregarAlCarrito('${prod.id}')">Agregar +</button>
                </div>`;
        });

        function agregarAlCarrito(id) {
            const prod = productosDisponibles.find(p => p.id === id);
            const existe = carrito.find(item => item.id === id);
            if (existe) { existe.cantidad++; } else { carrito.push({ ...prod, cantidad: 1 }); }
            actualizarInterfaz();
        }

        function cambiarCantidad(id, cambio) {
            const item = carrito.find(p => p.id === id);
            if (!item) return;
            item.cantidad += cambio;
            if (item.cantidad <= 0) { carrito = carrito.filter(p => p.id !== id); }
            actualizarInterfaz();
        }

        function eliminarDelCarrito(id) {
            carrito = carrito.filter(p => p.id !== id);
            actualizarInterfaz();
        }

        function actualizarInterfaz() {
            const listaHTML = document.getElementById('lista-carrito');
            listaHTML.innerHTML = "";
            let cuentaTotal = 0;
            let totalArticulos = 0;

            if(carrito.length === 0) {
                listaHTML.innerHTML = `<div style="text-align:center; color:#64748b; padding:30px; font-size:14px;">El carrito está vacío.<br>¡Agrega tus alitas favoritas!</div>`;
                document.getElementById('qr-block').style.display = "none";
            } else {
                document.getElementById('qr-block').style.display = "flex";
            }

            carrito.forEach(item => {
                let importeItem = item.precio * item.cantidad;
                cuentaTotal += importeItem;
                totalArticulos += item.cantidad;

                listaHTML.innerHTML += `
                    <div class="cart-item">
                        <div class="item-details">
                            <span class="item-name">${item.nombre}</span>
                            <span class="item-subtotal">$${importeItem.toFixed(2)}</span>
                        </div>
                        <div class="qty-controls">
                            <button class="cant-btn" onclick="cambiarCantidad('${item.id}', -1)">-</button>
                            <span class="qty-num">${item.cantidad}</span>
                            <button class="cant-btn" onclick="cambiarCantidad('${item.id}', 1)">+</button>
                            <button class="del-btn" onclick="eliminarDelCarrito('${item.id}')">×</button>
                        </div>
                    </div>`;
            });

            document.getElementById('badge-count').textContent = totalArticulos;
            document.getElementById('tot').textContent = cuentaTotal.toFixed(2);

            actualizarQR();
        }

        function actualizarQR() {
            if (carrito.length === 0) return;
            
            const totalFormateado = document.getElementById('tot').textContent;
            const clienteVal = document.getElementById('cliente_input').value;
            
            document.getElementById("qrcode").innerHTML = "";
            const textoQR = `Cliente:${clienteVal}\nTotal:$${totalFormateado}\nSpace Wings`;
            
            new QRCode(document.getElementById("qrcode"), {
                text: textoQR, width: 120, height: 120, colorDark : "#0f172a", colorLight : "#ffffff", correctLevel : QRCode.CorrectLevel.M
            });
        }

        function enviarWhatsApp() {
            if(carrito.length === 0) {
                alert("Por favor, agrega productos al carrito antes de continuar.");
                return;
            }

            const nombreCliente = document.getElementById('cliente_input').value.trim();
            let mensaje = `🚀 *NUEVO PEDIDO - SPACE WINGS* 🚀\n`;
            mensaje += `👤 *Cliente:* ${nombreCliente}\n`;
            mensaje += `-------------------------------------\n`;
            
            carrito.forEach(item => {
                let subtotal = item.precio * item.cantidad;
                mensaje += `📦 *${item.cantidad}x* ${item.nombre} -> _$${subtotal.toFixed(2)}_\n`;
            });
            
            mensaje += `-------------------------------------\n`;
            mensaje += `💰 *TOTAL A PAGO:* $${document.getElementById('tot').textContent}\n\n`;
            mensaje += `¡Muchas gracias! 🙌`;

            const urlWhatsApp = "wa.me" + encodeURIComponent(mensaje);
            window.open(urlWhatsApp, '_blank');
        }

        // Inicialización inicial
        actualizarInterfaz();
    </script>
</body>
</html>
